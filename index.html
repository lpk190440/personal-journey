        </div>
        <div class="profile-stat">
          <div class="stat-value" x-text="tasks.length"></div>
          <div class="stat-label">任务</div>
        </div>
        <div class="profile-stat">
          <div class="stat-value" x-text="checkins.length"></div>
          <div class="stat-label">打卡</div>
        </div>
        <div class="profile-stat">
          <div class="stat-value" x-text="memoryItems.length"></div>

            <input class="input" type="tel" x-model="profileForm.phone" placeholder="选填">
          </div>
        </div>

      <template x-if="!profileEditing">

          <div class="profile-info-row">

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              账户
            </div>
            <div class="info-value" x-text="(authUser && authUser.username) || '未注册'"></div>
          </div>
          <div class="profile-info-row">
            <div class="info-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
              数据版本
            </div>
            <div class="info-value" x-text="'V' + dataVersion"></div>
          </div>
          <div class="profile-info-row">
            <div class="info-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>

            </div>

          </div>
          <template x-if="profileForm.nickname">
            <div class="profile-info-row">
              <div class="info-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                昵称
              </div>
              <div class="info-value" x-text="profileForm.nickname"></div>
            </div>
          </template>
          <template x-if="profileForm.email">
            <div class="profile-info-row">
              <div class="info-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

              <div class="info-value" x-text="profileForm.email"></div>

              <div class="info-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                手机
              </div>
              <div class="info-value" x-text="profileForm.phone"></div>
            </div>
          </template>
          <div class="profile-info-row">
            <div class="info-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              账户创建
            </div>
            <div class="info-value" x-text="authCreatedAt || '未注册'"></div>
          </div>

            <div class="info-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>

            <div class="info-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
              智能记忆

              <span x-text="memoryItems.length + ' 条'"></span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </div>
          <div class="profile-info-row" style="cursor:pointer;" @click="page = 'cleanup'">
            <div class="info-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>

          <div class="profile-info-row" style="cursor:pointer;" @click="page = 'settings'">

            <div style="display:flex;align-items:center;gap:4px;color:var(--text-weak);font-size:12px;">

          </div>
          <div class="profile-info-row" style="cursor:pointer;" @click="page = 'dataio'">
            <div class="info-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              数据管理

            <div style="display:flex;align-items:center;gap:4px;color:var(--text-weak);font-size:12px;">
              <span>导入导出</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>

        <div class="section-title">安全</div>
        <template x-if="authUser">
          <div class="flex gap-sm">
            <button class="btn btn-secondary btn-sm" style="flex:1" @click="authLockApp()">锁定屏幕</button>
            <button class="btn btn-ghost btn-sm" style="flex:1" @click="authLogout()">退出登录</button>
          </div>

        <template x-if="!authUser">
          <div class="hint-card" style="padding: 12px;">
            <div class="desc">注册账户后可使用锁屏保护和密码加密功能</div>

  <!-- ========== 页面：数据清理 ========== -->
  <template x-if="page === 'cleanup'">
  <div class="page active" id="page-cleanup">
    <div class="page-header">
      <h1>数据清理</h1>
      <button class="btn btn-ghost btn-sm" @click="page = 'profile'">返回</button>
    </div>
    <div class="page-content">
      <!-- 扫描结果摘要 -->
      <template x-if="cleanupScanned">
        <div class="cleanup-summary" :class="cleanupTotalIssues() === 0 ? 'clean' : ''">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span x-text="cleanupTotalIssues() === 0 ? '数据整洁，没有发现问题' : '发现 ' + cleanupTotalIssues() + ' 条可清理项目'"></span>
        </div>
      </template>

      <template x-if="!cleanupScanned">
        <div class="card" style="text-align:center; padding: 24px;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--text-weak)" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <p style="margin-top: 12px; font-size: 13px; color: var(--text-secondary);">点击扫描，检查数据中的冗余信息</p>
          <button class="btn btn-primary mt-md" @click="runCleanupScan()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            开始扫描
          </button>
        </div>
      </template>

      <template x-if="cleanupScanned">
        <div>
          <!-- 空标题记录 -->
          <div class="cleanup-scan-card" x-show="cleanupIssues.emptyTitles.length > 0">
            <div class="cleanup-category">
              <div class="cleanup-category-header">
                <div class="cleanup-category-title">
                  <svg viewBox="0 0 24 24" fill="none" stroke="var(--error-color)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                  空标题记录
                </div>
                <div class="cleanup-category-count has-items" x-text="cleanupIssues.emptyTitles.length + ' 条'"></div>
              </div>
              <template x-for="item in cleanupIssues.emptyTitles" :key="item.id">
                <div class="cleanup-item">
                  <div class="item-info">
                    <span class="badge" style="background:var(--bg-secondary);margin-right:6px;" x-text="item.table"></span>
                    <span x-text="item.desc"></span>
                  </div>
                  <div class="item-action">
                    <button class="btn btn-ghost btn-sm" @click="deleteCleanupItem(item)">删除</button>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- 重复记录 -->
          <div class="cleanup-scan-card" x-show="cleanupIssues.duplicates.length > 0">
            <div class="cleanup-category">
              <div class="cleanup-category-header">
                <div class="cleanup-category-title">
                  <svg viewBox="0 0 24 24" fill="none" stroke="var(--warning-color)" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
                  重复记录
                </div>
                <div class="cleanup-category-count has-items" x-text="cleanupIssues.duplicates.length + ' 组'"></div>
              </div>
              <template x-for="group in cleanupIssues.duplicates" :key="group.key">
                <div class="cleanup-item">
                  <div class="item-info">
                    <span class="badge" style="background:var(--bg-secondary);margin-right:6px;" x-text="group.table"></span>
                    <span x-text="group.desc"></span>
                  </div>
                  <div class="item-action">
                    <button class="btn btn-ghost btn-sm" @click="deleteDuplicateItems(group)">删除多余</button>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- 过期/旧数据 -->
          <div class="cleanup-scan-card" x-show="cleanupIssues.expired.length > 0">
            <div class="cleanup-category">
              <div class="cleanup-category-header">
                <div class="cleanup-category-title">
                  <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  超过90天旧数据
                </div>
                <div class="cleanup-category-count has-items" x-text="cleanupIssues.expired.length + ' 条'"></div>
              </div>
              <template x-for="item in cleanupIssues.expired" :key="item.id">
                <div class="cleanup-item">
                  <div class="item-info">
                    <span class="badge" style="background:var(--bg-secondary);margin-right:6px;" x-text="item.table"></span>
                    <span x-text="item.desc"></span>
                  </div>
                  <div class="item-action">
                    <button class="btn btn-ghost btn-sm" @click="deleteCleanupItem(item)">删除</button>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- NLP历史缓存 -->
          <div class="cleanup-scan-card" x-show="cleanupIssues.nlpCache.length > 0">
            <div class="cleanup-category">
              <div class="cleanup-category-header">
                <div class="cleanup-category-title">
                  <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                  NLP历史缓存
                </div>
                <div class="cleanup-category-count has-items" x-text="cleanupIssues.nlpCache.length + ' 条'"></div>
              </div>
              <template x-for="item in cleanupIssues.nlpCache.slice(0, 5)" :key="item.id">
                <div class="cleanup-item">
                  <div class="item-info" x-text="item.desc"></div>
                </div>
              </template>
              <template x-if="cleanupIssues.nlpCache.length > 5">
                <div style="font-size:11px;color:var(--text-weak);padding:4px 12px;">...还有 <span x-text="cleanupIssues.nlpCache.length - 5"></span> 条</div>
              </template>
            </div>
          </div>

          <!-- localStorage碎片 -->
          <div class="cleanup-scan-card" x-show="cleanupIssues.localStorageFragments.length > 0">
            <div class="cleanup-category">
              <div class="cleanup-category-header">
                <div class="cleanup-category-title">
                  <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
                  存储碎片
                </div>
                <div class="cleanup-category-count has-items" x-text="cleanupIssues.localStorageFragments.length + ' 个'"></div>
              </div>
              <template x-for="item in cleanupIssues.localStorageFragments" :key="item.key">
                <div class="cleanup-item">
                  <div class="item-info" x-text="item.desc"></div>
                  <div class="item-action">
                    <button class="btn btn-ghost btn-sm" @click="deleteCleanupItem(item)">清理</button>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- 全部干净 -->
          <template x-if="cleanupTotalIssues() === 0">
            <div class="card" style="text-align:center; padding: 32px;">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--task-color)" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              <p style="margin-top: 12px; font-size: 14px; color: var(--text-secondary);">所有数据都很整洁</p>
            </div>
          </template>

          <!-- 操作按钮 -->
          <template x-if="cleanupTotalIssues() > 0">
            <div style="margin-top: 16px;">
              <button class="btn btn-primary w-full" @click="cleanupAll()">一键清理全部</button>
              <button class="btn btn-ghost btn-sm w-full mt-sm" @click="cleanupScanned = false">重新扫描</button>
            </div>
          </template>
          <template x-if="cleanupTotalIssues() === 0">
            <button class="btn btn-ghost btn-sm w-full mt-sm" @click="cleanupScanned = false">重新扫描</button>
          </template>
        </div>
      </template>
    </div>
  </div>
  </template>

  <!-- ========== 页面：数据统计 ========== -->
  <template x-if="page === 'stats'">
  <div class="page active" id="page-stats">
    <div class="page-header">
      <h1>数据统计</h1>
      <button class="btn btn-ghost btn-sm" @click="page = 'insight'">返回</button>
    </div>
    <div class="page-content">
      <!-- 任务完成趋势（7天） -->
      <div class="chart-card">
        <div class="chart-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          任务完成趋势（近7天）
        </div>
        <div style="display:flex;align-items:flex-end;justify-content:space-around;height:100px;padding:0 4px;">
          <template x-for="d in taskCompletionTrend()" :key="d.label">
            <div style="display:flex;flex-direction:column;align-items:center;flex:1;">
              <span class="text-xs text-secondary" style="margin-bottom:4px;" x-text="d.completed + '/' + d.total"></span>
              <div :style="{
                width:'28px',
                height: d.pct > 0 ? (d.pct * 80) + 'px' : '2px',
                background: d.pct >= 0.8 ? 'var(--task-color)' : d.pct >= 0.4 ? 'var(--accent)' : 'var(--border)',
                borderRadius:'4px 4px 0 0',
                opacity: d.pct > 0 ? 0.7 : 0.3,
                transition:'height 0.5s ease'
              }"></div>
              <span class="text-xs text-weak mt-xs" x-text="d.label"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- 番茄钟统计 -->
      <div class="chart-card">
        <div class="chart-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          番茄钟统计
        </div>
        <div style="display:flex;gap:16px;text-align:center;">
          <div style="flex:1;">
            <div style="font-size:var(--text-2xl);font-weight:600;color:var(--accent);" x-text="pomodoroStats().todayMinutes + 'min'"></div>
            <div class="text-xs text-secondary">今日专注</div>
          </div>
          <div style="flex:1;">
            <div style="font-size:var(--text-2xl);font-weight:600;" x-text="pomodoroStats().weekCount + '次'"></div>
            <div class="text-xs text-secondary">本周完成</div>
          </div>
          <div style="flex:1;">
            <div style="font-size:var(--text-2xl);font-weight:600;" x-text="pomodoroStats().totalCount + '次'"></div>
            <div class="text-xs text-secondary">累计完成</div>
          </div>
        </div>
      </div>

      <!-- 目标完成率 -->
      <div class="chart-card">
        <div class="chart-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/></svg>
          目标进度
        </div>
        <template x-for="g in goals.slice(0, 5)" :key="g.id">
          <div class="mini-chart-row">
            <span class="text-xs" style="flex-shrink:0;width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" x-text="g.title"></span>
            <div class="mini-chart-bar-wrap">
              <div class="mini-chart-bar" :style="'width:' + (goalProgress(g) || 0) + '%;background:var(--accent);'"></div>
            </div>
            <span class="text-xs text-secondary" x-text="(goalProgress(g) || 0) + '%'"></span>
          </div>
        </template>
        <template x-if="goals.length === 0">
          <div class="text-xs text-weak" style="padding:12px 0;text-align:center;">暂无目标</div>
        </template>
      </div>

      <!-- 打卡热力图（月度简化版） -->
      <div class="chart-card">
        <div class="chart-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
          本月打卡热力图
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">
          <template x-for="(cell, idx) in monthHeatmap()" :key="idx">
            <div :style="{
              aspectRatio:'1',
              borderRadius:'3px',
              background: cell.intensity === 'high' ? 'var(--accent)' : cell.intensity === 'medium' ? 'var(--task-color)' : cell.intensity === 'low' ? 'var(--border)' : 'var(--bg-secondary)',
              opacity: cell.intensity === 'none' ? 0.4 : 0.8,
            }" :title="cell.date || ''"></div>
          </template>
        </div>
        <div class="chart-legend">
          <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--bg-secondary);border:0.5px solid var(--border);"></div> 未打卡</div>
          <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--border);"></div> C档</div>
          <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--task-color);"></div> B档</div>
          <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--accent);"></div> A档</div>
        </div>
      </div>
    </div>
  </div>
  </template>

  <!-- ========== 页面：智能记忆 ========== -->
  <template x-if="page === 'memory'">
  <div class="page active memory-category-colors" id="page-memory">
    <div class="page-header">
      <div class="flex items-center gap-sm">
        <button class="btn btn-ghost btn-sm" @click="goToLauncher()" style="padding: 2px 6px;">←</button>
        <h1>智能记忆</h1>
      </div>
      <div style="display:flex;gap:8px;">
        <template x-if="!memoryShowForm && !memoryEditingId">
          <button class="btn btn-primary btn-sm" @click="openMemoryForm()">+ 添加</button>
        </template>
        <template x-if="memoryEditingId">
          <button class="btn btn-ghost btn-sm" @click="cancelMemoryEdit()">取消</button>
        </template>
      </div>
    </div>
    <div class="page-content">
      <!-- 添加/编辑表单 -->
      <template x-if="memoryShowForm || memoryEditingId">
        <div class="memory-form-card" x-transition>
          <div class="form-title" x-text="memoryEditingId ? '编辑物品信息' : '记录新物品位置'"></div>
          <div class="form-group">
            <label>物品名称</label>
            <input class="input" type="text" x-model="memoryForm.name" placeholder="例如：护照、钥匙、充电器..." @keydown.enter="saveMemoryItem()">
          </div>
          <div class="form-group">
            <label>存放位置</label>
            <input class="input" type="text" x-model="memoryForm.location" placeholder="例如：书房抽屉第二层、衣柜左侧..." @keydown.enter="saveMemoryItem()">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>分类</label>
              <select class="input" x-model="memoryForm.category">
                <template x-for="cat in memoryCategories" :key="cat.value">
                  <option :value="cat.value" x-text="cat.label"></option>
                </template>
              </select>
            </div>
            <div class="form-group">
              <label>存放时间</label>
              <input class="input" type="date" x-model="memoryForm.storedDate">
            </div>
          </div>
          <div class="form-group">
            <label>备注</label>
            <textarea class="input" x-model="memoryForm.note" placeholder="选填，补充说明..." rows="2"></textarea>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-primary" style="flex:1" @click="saveMemoryItem()" x-text="memoryEditingId ? '保存修改' : '记录位置'"></button>
            <button class="btn btn-ghost" @click="memoryShowForm = false; memoryEditingId = null;">取消</button>
          </div>
        </div>
      </template>

      <!-- 搜索栏 -->
      <div class="memory-search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="text" x-model="memorySearch" placeholder="搜索物品名称或位置..." @input="filterMemoryItems()">
        <button class="search-clear" x-show="memorySearch" @click="memorySearch = ''; filterMemoryItems()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- 分类筛选 -->
      <div class="memory-filters">
        <button class="memory-filter-chip" :class="{ active: memoryFilter === 'all' }" @click="memoryFilter = 'all'; filterMemoryItems()">全部</button>
        <template x-for="cat in memoryCategories" :key="cat.value">
          <button class="memory-filter-chip" :class="{ active: memoryFilter === cat.value }" @click="memoryFilter = cat.value; filterMemoryItems()" x-text="cat.label"></button>
        </template>
      </div>

      <!-- 记忆列表 -->
      <template x-if="filteredMemoryItems().length > 0">
        <div>
          <template x-for="item in filteredMemoryItems()" :key="item.id">
            <div class="memory-item-card" @click="memorySelectedIds.includes(item.id) ? null : editMemoryItem(item)">
              <div class="item-top">
                <div class="item-name" x-text="item.name"></div>
                <div style="display:flex;align-items:center;gap:6px;">
                  <div class="item-category" :class="'cat-' + item.category" x-text="getMemoryCategoryLabel(item.category)"></div>
                  <button class="btn btn-ghost" style="padding:4px;min-width:auto;" @click.stop="deleteMemoryItem(item.id)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                  </button>
                </div>
              </div>
              <div class="item-location">

  <!-- ========== 页面：数据导入导出 ========== -->
  <template x-if="page === 'dataio'">
  <div class="page active" id="page-dataio">
    <div class="page-header">
      <div class="io-header-bar" style="margin-bottom: 0;">
        <button class="btn btn-ghost btn-sm" @click="page = 'settings'">返回</button>
        <h2>数据管理中心</h2>
      </div>
    </div>
    <div class="page-content">
      <div class="io-tabs">
        <button class="io-tab" :class="{ active: ioTab === 'export' }" @click="ioTab = 'export'; ioReset()">导出</button>
        <button class="io-tab" :class="{ active: ioTab === 'import' }" @click="ioTab = 'import'; ioReset()">导入</button>
        <button class="io-tab" :class="{ active: ioTab === 'log' }" @click="ioTab = 'log'">操作日志</button>
      </div>

      <!-- === 导出Tab === -->
      <template x-if="ioTab === 'export'">
        <div>
          <div class="card">
            <div class="card-title">选择导出格式</div>
            <div class="io-format-grid">
              <button class="io-format-btn" :class="{ active: ioExportFormat === 'json' }" @click="ioExportFormat = 'json'">
                <div class="format-icon">{ }</div>
                <div class="format-name">JSON</div>
              </button>
              <button class="io-format-btn" :class="{ active: ioExportFormat === 'csv' }" @click="ioExportFormat = 'csv'">
                <div class="format-icon">DATA</div>
                <div class="format-name">CSV</div>
              </button>
              <button class="io-format-btn" :class="{ active: ioExportFormat === 'excel' }" @click="ioExportFormat = 'excel'">
                <div class="format-icon">XLS</div>
                <div class="format-name">Excel</div>
              </button>
            </div>
          </div>
          <div class="card">
            <div class="card-title">选择数据表</div>
            <div class="io-export-section">
              <template x-for="table in ioExportTables" :key="table.key">
                <div class="io-export-row">
                  <div class="checkbox" :class="{ checked: table.checked }" @click="table.checked = !table.checked">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                  <div class="label">
                    <div class="name" x-text="table.name"></div>
                    <div class="count" x-text="table.count + ' 条记录'"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>
          <div class="io-result" x-show="ioExportResult" :class="ioExportResult?.type || 'success'" x-text="ioExportResult?.msg"></div>
          <button class="btn btn-primary w-full" @click="ioExport()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            开始导出
          </button>
        </div>
      </template>

      <!-- === 导入Tab === -->
      <template x-if="ioTab === 'import'">
        <div>
          <div class="io-dropzone" @dragover.prevent="ioDragover = true" @dragleave.prevent="ioDragover = false" @drop.prevent="ioHandleDrop($event)" :class="{ dragover: ioDragover }" @click="$refs.ioFileInput.click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>拖拽文件到此处，或点击选择文件</p>
            <p class="hint">支持 JSON / CSV / Excel (.xlsx) 格式</p>
          </div>
          <input type="file" accept=".json,.csv,.xlsx,.xls" style="display:none;" x-ref="ioFileInput" @change="ioSelectFile($event)">

          <!-- 文件预览 -->
          <template x-if="ioImportPreview">
            <div>
              <div class="card">
                <div class="flex justify-between items-center">
                  <div>
                    <span class="card-title" x-text="ioImportPreview.fileName"></span>
                    <span class="badge badge-info" style="margin-left: 6px;" x-text="ioImportPreview.format.toUpperCase()"></span>
                  </div>
                  <span class="text-xs text-secondary" x-text="(ioImportPreview.size / 1024).toFixed(1) + ' KB'"></span>
                </div>
                <div class="mt-sm" x-text="ioImportPreview.tables.length + ' 个数据表可导入'"></div>
                <template x-for="table in ioImportPreview.tables" :key="table.key">
                  <div class="io-export-row mt-sm">
                    <div class="checkbox" :class="{ checked: table.selected }" @click="table.selected = !table.selected">
                      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <div class="label">
                      <div class="name" x-text="table.name + ' (' + table.count + '条)'"></div>
                      <div class="count" x-text="table.key"></div>
                    </div>
                    <span class="badge" :class="table.hasConflict ? 'badge-warning' : 'badge-success'" x-text="table.hasConflict ? '有冲突' : '无冲突'"></span>
                  </div>
                </template>
              </div>

              <!-- 冲突处理 -->
              <template x-if="ioConflicts.length > 0">
                <div class="card" style="border-color: var(--hint-color);">
                  <div class="card-title">冲突处理</div>
                  <div class="text-xs text-secondary mb-sm">检测到以下数据冲突，请选择处理方式</div>
                  <template x-for="c in ioConflicts" :key="c.id">
                    <div class="io-conflict-item">
                      <div class="conflict-title" x-text="c.type + ': ' + c.title"></div>
                      <div class="text-xs text-secondary" x-text="'现有: ' + c.existing + ' | 导入: ' + c.incoming"></div>
                      <div class="io-conflict-actions mt-sm">
                        <button class="btn btn-sm btn-secondary" @click="c.action = 'skip'; ioUpdateConflict(c)">跳过</button>
                        <button class="btn btn-sm btn-secondary" @click="c.action = 'overwrite'; ioUpdateConflict(c)">覆盖</button>
                        <button class="btn btn-sm btn-secondary" @click="c.action = 'merge'; ioUpdateConflict(c)">合并</button>
                        <button class="btn btn-sm btn-secondary" @click="c.action = 'rename'; ioUpdateConflict(c)">重命名导入</button>
                      </div>
                    </div>
                  </template>
                </div>
              </template>

              <!-- 进度 -->
              <template x-if="ioImporting">
                <div class="io-progress">
                  <div class="io-progress-bar">
                    <div class="io-progress-fill" :style="'width: ' + ioImportProgress + '%'"></div>
                  </div>
                  <div class="io-progress-text">
                    <span x-text="ioImportProgress + '%'"></span>
                    <span x-text="ioImportStatusText"></span>
                  </div>
                </div>
              </template>

              <!-- 结果 -->
              <div class="io-result" x-show="ioImportResult" :class="ioImportResult?.type || 'success'" x-text="ioImportResult?.msg"></div>

              <div class="flex gap-sm">
                <button class="btn btn-primary" style="flex: 1;" @click="ioImportExecute()" :disabled="ioImporting" x-text="ioImporting ? '导入中...' : '开始导入'">
                </button>
                <button class="btn btn-secondary" @click="ioReset()">取消</button>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- === 日志Tab === -->
      <template x-if="ioTab === 'log'">
        <div>
          <div class="card">
            <div class="flex justify-between items-center mb-sm">
              <span class="card-title">操作日志</span>
              <button class="btn btn-ghost btn-sm" @click="ioLogs = []; saveData()">清空日志</button>
            </div>
            <template x-if="ioLogs.length === 0">
              <div class="empty-state" style="padding: 24px;">
                <p>暂无操作记录</p>
              </div>
            </template>
            <div class="io-log" x-show="ioLogs.length > 0">
              <template x-for="log in [...ioLogs].reverse()" :key="log.id">
                <div>
                  <span class="log-time" x-text="log.time"></span>
                  <span :class="'log-' + log.type" x-text="log.msg"></span>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>
  </template>

      <div class="io-header-bar" style="margin-bottom: 0;">
        <button class="btn btn-ghost btn-sm" @click="page = 'settings'">返回</button>

    <div class="page-content">

      <div class="card">
        <div class="card-title">数据版本</div>
        <div class="flex justify-between items-center mt-sm">
          <div>
            <span class="text-sm">Schema版本</span>
            <span class="version-badge latest" style="margin-left: 6px;" x-text="'V' + dataVersion"></span>
          </div>
          <span class="text-xs text-secondary" x-text="'数据大小: ' + dataStorageSize"></span>

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span x-text="migrationStatusText"></span>
        </div>
      </div>

      <!-- 数据完整性 -->
      <div class="card">
        <div class="card-title">数据完整性检查</div>
        <button class="btn btn-secondary btn-sm mt-sm" @click="runIntegrityCheck()">运行检查</button>
        <div class="mt-md">
          <template x-for="check in integrityChecks" :key="check.name">
            <div class="integrity-check" :class="check.status">
              <div class="check-icon">
                <template x-if="check.status === 'pass'">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                </template>
                <template x-if="check.status === 'fail'">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </template>
                <template x-if="check.status === 'pending'">
                  <span style="font-size: 10px;">?</span>
                </template>
              </div>
              <span class="text-sm" x-text="check.name"></span>
              <span class="text-xs text-secondary" style="margin-left: auto;" x-text="check.detail || ''"></span>
            </div>
          </template>
        </div>

      <!-- 迁移历史 -->
      <div class="card">
        <div class="card-title">迁移历史</div>
        <template x-if="migrationHistory.length === 0">

        <template x-for="(mig, idx) in [...migrationHistory].reverse()" :key="idx">

              <span class="text-sm" x-text="'V' + mig.from + ' → V' + mig.to"></span>

            <span class="text-xs text-secondary" x-text="mig.time"></span>
          </div>

        <div class="flex gap-sm mt-sm">
          <button class="btn btn-secondary" style="flex: 1;" @click="createBackup()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>

          </button>
          <label class="btn btn-secondary" style="flex: 1; cursor: pointer;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            恢复备份
            <input type="file" accept=".json" style="display: none;" @change="restoreBackup($event)">
          </label>
        </div>
        <template x-if="backups.length > 0">
          <div class="mt-md">
            <div class="text-xs text-secondary mb-sm">已有备份</div>
            <template x-for="(bk, idx) in backups" :key="idx">
              <div class="flex justify-between items-center" style="padding: 8px 0; border-bottom: 0.5px solid var(--border-light);">
                <div>
                  <span class="text-sm" x-text="bk.label"></span>
                  <span class="text-xs text-secondary" style="margin-left: 6px;" x-text="bk.size"></span>
                </div>
                <div class="flex gap-sm">
                  <button class="btn btn-ghost btn-sm" @click="downloadBackup(bk)">下载</button>
                  <button class="btn btn-ghost btn-sm" @click="deleteBackup(idx)" style="color: var(--contact-color);">删除</button>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>

      <!-- 手动迁移 -->
      <div class="card">
        <div class="card-title">手动迁移</div>
        <div class="text-xs text-secondary mb-sm">如果自动迁移未触发，可手动执行</div>
        <button class="btn btn-secondary w-full" @click="runMigration()" :disabled="isMigrating" x-text="isMigrating ? '迁移中...' : '执行版本迁移'">
        </button>
        <template x-if="migrationLog.length > 0">
          <div class="migration-log mt-md">
            <template x-for="(entry, idx) in migrationLog" :key="idx">
              <div>
                <span class="log-time" x-text="entry.time"></span>
                <span :class="'log-' + entry.type" x-text="entry.msg"></span>
              </div>
            </template>
          </div>
        </template>
      </div>

      <!-- 迁移结果 -->
      <div class="io-result" x-show="migrationResult" :class="migrationResult?.type || 'success'" x-text="migrationResult?.msg"></div>
    </div>
  </div>
  </template>

  <!-- ========== 目标编辑模态框 ========== -->
  <div class="modal-overlay" x-show="showGoalModal" @click.self="showGoalModal = false" x-transition style="display: none;">
    <div>
      <div class="flex justify-between items-center" style="margin-bottom: 20px;">
        <h3 style="font-size: 18px; font-weight: 500;" x-text="editingGoal ? '编辑目标' : '新建目标'"></h3>
        <button class="btn btn-ghost btn-sm" @click="showGoalModal = false">关闭</button>
      </div>

      <label class="text-sm" style="display: block; margin-bottom: 6px;">目标类型</label>
      <select class="input" x-model="goalForm.type" style="margin-bottom: 12px;">
        <option value="年">年度目标</option>
        <option value="季">季度目标</option>
        <option value="月">月度目标</option>
        <option value="周">周目标</option>
        <option value="日">日目标</option>
      </select>

      <label class="text-sm" style="display: block; margin-bottom: 6px;">目标标题</label>
      <input class="input" x-model="goalForm.title" placeholder="例如：通过PMP认证" style="margin-bottom: 12px;">

      <label class="text-sm" style="display: block; margin-bottom: 6px;">关键结果（每行一个）</label>
      <textarea class="input" x-model="goalForm.krText" placeholder="学完35学时课程&#10;模考分数达75%&#10;完成3次模拟考试" rows="3" style="margin-bottom: 12px;"></textarea>

      <label class="text-sm" style="display: block; margin-bottom: 6px;">上级目标</label>
      <select class="input" x-model="goalForm.parentId" style="margin-bottom: 12px;">
        <option value="">无（顶层目标）</option>
        <template x-for="g in goals" :key="g.id">
          <option :value="g.id" x-text="g.title" x-show="g.id !== editingGoal?.id"></option>
        </template>
      </select>

      <label class="text-sm" style="display: block; margin-bottom: 6px;">反目标护栏（每行一个）</label>
      <textarea class="input" x-model="goalForm.antiGoalsText" placeholder="不要为了考证牺牲睡眠&#10;不要连续三周不运动" rows="2" style="margin-bottom: 12px;"></textarea>

      <button class="btn btn-primary w-full" @click="saveGoal()" x-text="editingGoal ? '保存修改' : '创建目标'"></button>
      <button class="btn btn-ghost btn-sm w-full mt-sm" x-show="editingGoal" @click="deleteGoal(editingGoal)">删除此目标</button>
    </div>
  </div>

  <!-- ========== 快速添加任务模态框 ========== -->
  <div class="modal-overlay" x-show="openQuickAdd" @click.self="openQuickAdd = false" x-transition style="display: none;">
    <div>
      <div class="flex justify-between items-center" style="margin-bottom: 20px;">
        <h3 style="font-size: 18px; font-weight: 500;">快速添加任务</h3>
        <button class="btn btn-ghost btn-sm" @click="openQuickAdd = false">关闭</button>
      </div>

      <label class="text-sm" style="display: block; margin-bottom: 6px;">任务描述</label>
      <input class="input" x-model="quickTaskForm.title" placeholder="例如：下午3点开会讨论项目方案 #工作" style="margin-bottom: 12px;">

      <div class="flex gap-sm" style="margin-bottom: 12px;">
        <button class="btn btn-sm" :class="quickTaskForm.tag === 'work' ? 'btn-primary' : 'btn-secondary'" @click="quickTaskForm.tag = 'work'">工作</button>
        <button class="btn btn-sm" :class="quickTaskForm.tag === 'life' ? 'btn-primary' : 'btn-secondary'" @click="quickTaskForm.tag = 'life'">生活</button>
        <button class="btn btn-sm" :class="quickTaskForm.tag === 'grow' ? 'btn-primary' : 'btn-secondary'" @click="quickTaskForm.tag = 'grow'">成长</button>
      </div>

      <button class="btn btn-primary w-full" @click="quickAddTask()">添加任务</button>
    </div>
  </div>

  <!-- ========== 任务编辑模态框 ========== -->
  <div class="modal-overlay" x-show="showEditModal" @click.self="showEditModal = false" x-transition style="display: none;">
    <div>
      <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 20px;">编辑任务</h2>
      <div class="edit-form-group">
        <label>任务标题</label>
        <input class="input" x-model="editForm.title">
      </div>
      <div class="flex gap-sm">
        <div class="edit-form-group" style="flex: 1;">
          <label>时间</label>
          <input class="input" x-model="editForm.time" type="time">
        </div>
        <div class="edit-form-group" style="flex: 1;">
          <label>时长(分钟)</label>
          <input class="input" x-model.number="editForm.duration" type="number" min="5" max="480">
        </div>
      </div>
      <div class="edit-form-group">
        <label>标签</label>
        <div class="flex gap-sm">
          <button class="tag" :class="editForm.tags.includes('work') ? 'tag-work' : ''" style="cursor: pointer; opacity: editForm.tags.includes('work') ? 1 : 0.5;" @click="editForm.tags = editForm.tags.includes('work') ? editForm.tags.filter(t=>t!=='work') : [...editForm.tags,'work']">工作</button>
          <button class="tag" :class="editForm.tags.includes('life') ? 'tag-life' : ''" style="cursor: pointer; opacity: editForm.tags.includes('life') ? 1 : 0.5;" @click="editForm.tags = editForm.tags.includes('life') ? editForm.tags.filter(t=>t!=='life') : [...editForm.tags,'life']">生活</button>
          <button class="tag" :class="editForm.tags.includes('grow') ? 'tag-grow' : ''" style="cursor: pointer; opacity: editForm.tags.includes('grow') ? 1 : 0.5;" @click="editForm.tags = editForm.tags.includes('grow') ? editForm.tags.filter(t=>t!=='grow') : [...editForm.tags,'grow']">成长</button>
          <button class="tag" :class="editForm.tags.includes('important') ? 'tag-important' : ''" style="cursor: pointer; opacity: editForm.tags.includes('important') ? 1 : 0.5;" @click="editForm.tags = editForm.tags.includes('important') ? editForm.tags.filter(t=>t!=='important') : [...editForm.tags,'important']">重要</button>
        </div>
      </div>
      <div class="flex gap-sm">
        <div class="edit-form-group" style="flex: 1;">
          <label>优先级</label>
          <select class="input" x-model="editForm.priority">
            <option value="normal">普通</option>
            <option value="high">高</option>
            <option value="low">低</option>
          </select>
        </div>
        <div class="edit-form-group" style="flex: 1;">
          <label>类型</label>
          <select class="input" x-model="editForm.type">
            <option value="固定">固定</option>
            <option value="弹性">弹性</option>
          </select>
        </div>
      </div>
      <div class="flex gap-sm" style="margin-bottom: 20px;">
        <label class="toggle" style="flex: 1; display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" x-model="editForm.recurring">
          <span class="slider"></span>
          <span class="text-sm">循环任务</span>
        </label>
        <label class="toggle" style="flex: 1; display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" x-model="editForm.locked">
          <span class="slider"></span>
          <span class="text-sm">锁定</span>
        </label>
      </div>
      <div class="flex gap-sm">
        <button class="btn btn-secondary" style="flex: 1;" @click="showEditModal = false">取消</button>
        <button class="btn btn-primary" style="flex: 1;" @click="saveEditTask()">保存</button>
      </div>
    </div>
  </div>

  <!-- ========== PWA 安装提示 ========== -->
  <div x-show="pwaInstallVisible" x-transition
    style="position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: calc(100% - 48px); max-width: 432px; background: var(--card-bg); border-radius: var(--radius-lg); padding: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); z-index: 150; border: 0.5px solid var(--border); display: none;">
    <div class="flex items-center gap-md">
      <div style="width: 40px; height: 40px; border-radius: 10px; background: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>
      <div class="flex-1">
        <p style="font-weight: 500; font-size: 13px;">添加到主屏幕</p>
        <p class="text-xs text-secondary">随时查看你的时间轴和打卡记录</p>
      </div>
      <div class="flex gap-sm">
        <button class="btn btn-ghost btn-sm text-xs" @click="dismissPWA()">暂不</button>
        <button class="btn btn-primary btn-sm" @click="installPWA()">添加</button>
      </div>
    </div>
  </div>
</div>
</div>

<!-- 手势导航指示器 -->
<div class="swipe-indicator" :class="{ visible: swipeHintVisible }" x-text="swipeHintText"></div>

<script src="js/app.js?v=202606100200"></script>
</body>
</html>
