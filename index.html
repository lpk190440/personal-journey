<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5B8C9B">
<meta name="description" content="个人智能操作系统 - 温和极简的个人OS">
<title>个人智能操作系统</title>
<link rel="manifest" href="manifest.json">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="css/style.css?v=202606100200">
<link rel="stylesheet" href="css/os-launcher.css?v=202606100200">
<link rel="stylesheet" href="css/ocean-theme.css?v=202606100200">
<link rel="stylesheet" href="css/irregular-shapes.css?v=202606100200">
<!-- OS 核心框架 -->
<script src="core/registry.js?v=202606100200"></script>
<script src="core/store.js?v=202606100200"></script>
<script src="core/graph.js?v=202606100200"></script>
<!-- 模块注册清单 -->
<script src="core/modules.js?v=202606100200"></script>
<!-- 新增模块 -->
<script src="modules/lifeplan/module.js?v=202606100200"></script>
<script src="modules/models/module.js?v=202606100200"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body x-data="app()">

<!-- ========== 启动器页面（个人智能操作系统主界面） ========== -->
<template x-if="page === 'launcher'">
<div class="os-launcher">
  <div class="os-launcher-header">
    <div class="os-title">🧠 个人智能操作系统</div>
    <div class="os-subtitle">Personal Intelligent OS · 温和极简的个人管理中心</div>
  </div>

  <!-- 模块分组（根据注册表动态渲染） -->
  <template x-for="layer in ['action','strategy','growth','dev','system']" :key="layer">
    <div class="os-layer-section" x-data="{ layerMods: getLayerModules(layer) }" x-show="layerMods.length > 0">
      <div class="os-layer-title" x-text="getLayerName(layer)"></div>
      <div class="os-module-grid">
        <template x-for="mod in layerMods" :key="mod.id">
          <div class="os-module-card" :class="{ 'coming-soon': mod.status !== 'active' }"
            @click="mod.status === 'active' ? enterModule(mod.id) : null">
            <span x-show="mod.status !== 'active'" class="os-module-badge">即将</span>
            <span class="os-module-icon" x-text="mod.icon"></span>
            <span class="os-module-name" x-text="mod.name"></span>
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- 今日快览 -->
  <div class="os-quick-summary">
    <div class="os-summary-title">今日快览</div>
    <div class="os-summary-items">
      <div class="os-summary-item">
        <span class="os-summary-icon">🌳</span>
        <span x-text="'专注 ' + (todayPomodoroMinutes ? todayPomodoroMinutes() : 0) + 'min'"></span>
      </div>
      <div class="os-summary-item">
        <span class="os-summary-icon">📋</span>
        <span x-text="'任务 ' + (todayCompletedCount ? todayCompletedCount() : 0) + '/' + (todayTasks ? todayTasks().length : 0)"></span>
      </div>
      <div class="os-summary-item">
        <span class="os-summary-icon">✓</span>
        <span x-text="(todayCheckedIn ? (todayCheckedIn() ? '已打卡' : '未打卡') : '未打卡')"></span>
      </div>
    </div>
  </div>

  <!-- 进入日常模式 -->
  <button class="os-enter-daily" @click="enterModule('home')">进入日常模式 →</button>
</div>
</template>

<!-- Toast通知容器 -->
<div class="toast-container" x-data="{ toasts: [] }">
  <template x-for="t in toasts" :key="t.id">
    <div class="toast" :class="t.type" x-show="t.visible" x-transition @click="t.visible = false; setTimeout(() => toasts.splice(toasts.indexOf(t), 1), 300)">
      <span x-text="t.msg"></span>
    </div>
  </template>
</div>

<!-- 返回拦截确认弹窗 -->
<div class="leave-confirm-overlay" x-show="_showLeaveConfirmDialog" x-transition.opacity @click.self="cancelLeave()">
  <div class="leave-confirm-card" x-transition.scale>
    <div class="leave-confirm-icon">⚠️</div>
    <div class="leave-confirm-title">确定要离开吗？</div>
    <p class="leave-confirm-desc">
      <template x-if="pomodoroRunning">番茄钟正在运行中</template>
      <template x-if="nlpInput && nlpInput.trim().length > 10">输入框中有未保存内容</template>
      <template x-if="journalDraft && journalDraft.trim().length > 0">日记草稿尚未保存</template>
      <template x-if="showEditModal || showGoalModal || showContactForm">编辑中的内容将丢失</template>
    </p>
    <div class="leave-confirm-actions">
      <button class="btn btn-secondary" style="flex:1;" @click="cancelLeave()">继续停留</button>
      <button class="btn btn-primary" style="flex:1;" @click="confirmLeave()">确认离开</button>
    </div>
  </div>
</div>

<!-- 认证锁屏 -->
<template x-if="authLocked && authState === 'active'">
<div class="lock-overlay">
  <div class="lock-icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
  </div>
  <h2>欢迎回来</h2>
  <p x-text="authUser ? authUser.username : ''"></p>
  <div style="width: 280px;">
    <div class="auth-form-group">
      <label>密码</label>
      <input class="input" type="password" x-model="authLockPassword" @keydown.enter="authUnlock()" placeholder="输入密码解锁" autofocus>
    </div>
    <div class="auth-error" x-text="authLockError"></div>
    <button class="btn btn-primary w-full" @click="authUnlock()">解锁</button>
    <button class="btn btn-ghost btn-sm w-full mt-sm" @click="authLogout()">切换账户</button>
  </div>
</div>
</template>

<!-- 认证登录/注册页 -->
<template x-if="!authState || authState === 'unauth'">
<div class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <h1>个人之旅</h1>
      <p>温和极简的零焦虑个人生活操作系统</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab" :class="{ active: authMode === 'login' }" @click="authMode = 'login'; authError = ''">登录</button>
      <button class="auth-tab" :class="{ active: authMode === 'register' }" @click="authMode = 'register'; authError = ''">注册</button>
    </div>
    <div class="auth-card" x-show="authMode === 'login'">
      <div class="auth-form-group">
        <label>用户名</label>
        <input class="input" type="text" x-model="authForm.username" @keydown.enter="authLogin()" placeholder="输入用户名">
      </div>
      <div class="auth-form-group">
        <label>密码</label>
        <input class="input" type="password" x-model="authForm.password" @keydown.enter="authLogin()" placeholder="输入密码">
      </div>
      <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 13px; cursor: pointer;">
        <input type="checkbox" x-model="authForm.remember" style="accent-color: var(--accent);">
        <span>记住密码</span>
      </label>
      <div class="auth-error" x-text="authError"></div>
      <button class="btn btn-primary w-full" @click="authLogin()">登录</button>
      <div class="mt-md text-center">
        <button class="btn btn-ghost btn-sm" @click="authShowReset = true; authError = ''">忘记密码？</button>
      </div>
    </div>
    <div class="auth-card" x-show="authMode === 'register'">
      <div class="auth-form-group">
        <label>用户名</label>
        <input class="input" type="text" x-model="authRegForm.username" placeholder="3-20个字符">
        <div class="auth-error" x-text="authRegForm.usernameErr"></div>
      </div>
      <div class="auth-form-group">
        <label>密码</label>
        <input class="input" type="password" x-model="authRegForm.password" @input="authCheckPasswordStrength()" placeholder="至少6位，建议包含字母和数字">
        <div class="password-strength"><div class="password-strength-bar" :class="passwordStrengthClass"></div></div>
        <div class="auth-hint" x-text="passwordStrengthLabel"></div>
        <div class="auth-error" x-text="authRegForm.passwordErr"></div>
      </div>
      <div class="auth-form-group">
        <label>确认密码</label>
        <input class="input" type="password" x-model="authRegForm.confirmPassword" @keydown.enter="authRegister()" placeholder="再次输入密码">
        <div class="auth-error" x-text="authRegForm.confirmErr"></div>
      </div>
      <div class="auth-form-group">
        <label>安全问题：你的出生城市是？</label>
        <input class="input" type="text" x-model="authRegForm.securityQuestion" placeholder="用于密码重置，请牢记答案">
      <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 13px; cursor: pointer;">
        <input type="checkbox" x-model="authRegForm.remember" style="accent-color: var(--accent);">
        <span>默认记住密码</span>
      </label>
      <div class="auth-error" x-text="authError"></div>
      <button class="btn btn-primary w-full" @click="authRegister()">创建账户</button>
    </div>
    <!-- 密码重置 -->
    <template x-if="authShowReset">
    <div class="auth-card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <span style="font-weight: 500;">重置密码</span>
        <button class="btn btn-ghost btn-sm" @click="authShowReset = false">×</button>
      </div>
      <div class="auth-form-group">
        <label>用户名</label>
        <input class="input" type="text" x-model="authResetForm.username" placeholder="输入要重置的用户名">
      </div>
      <div class="auth-form-group">
        <label>安全问题：你的出生城市是？</label>
        <input class="input" type="text" x-model="authResetForm.securityAnswer" @keydown.enter="authResetPassword()" placeholder="输入安全问题的答案">
      </div>
      <div class="auth-form-group">
        <label>新密码</label>
        <input class="input" type="password" x-model="authResetForm.newPassword" placeholder="至少6位">
      </div>
      <div class="auth-error" x-text="authError"></div>
      <button class="btn btn-primary w-full" @click="authResetPassword()">重置密码</button>
    </div>
    </template>
  </div>
</div>
</template>

<div class="app" :class="{ 'focus-active': focusMode && pomodoroRunning }" x-show="authState === 'active' && !authLocked">

  <!-- ========== 页面1：首页时间轴 ========== -->
  <template x-if="page === 'home'">
  <div class="page active" id="page-home">
    <div class="page-header">
      <div>
        <h1 x-text="'Hi, ' + (profileForm.nickname || authUser?.username || '你好')"></h1>
        <p class="subtitle" x-text="todayStr"></p>
      </div>
      <div class="flex gap-sm">
        <button class="btn btn-ghost btn-sm" @click="page = 'search'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="btn btn-ghost btn-sm" @click="page = 'checkin'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </button>
      </div>
    </div>

    <div class="page-content">
      <!-- 功能模块滑动栏 -->
      <div class="home-module-scroller" x-ref="moduleScroller" @scroll="updateModuleDot()">
        <div class="home-module-track">
          <template x-for="mod in homeModules" :key="mod.id">
            <button class="home-module-item"
              :style="{ '--mod-bg': mod.bg, '--mod-color': mod.color }"
              @click="mod.page ? page = mod.page : (mod.action ? $data[mod.action]() : null)">
              <div class="hmi-icon" :style="{ background: mod.bg, color: mod.color }">
                <svg x-if="mod.svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" x-html="mod.svg"></svg>
                <span x-if="!mod.svg" x-text="mod.icon" style="font-size: 18px;"></span>
              </div>
              <span class="hmi-label" x-text="mod.name"></span>
            </button>
          </template>
        </div>
      </div>

      <!-- 滑动指示器 -->
      <div class="home-module-dots" x-show="homeModuleDots > 1">
        <template x-for="i in homeModuleDots" :key="i">
          <span class="hmi-dot" :class="{ active: (i-1) === homeModuleDotIndex }"></span>
        </template>
      </div>

      <!-- ===== 今日概览面板 ===== -->
      <div class="dashboard-grid">
        <!-- 任务进度 -->
        <div class="dash-card">
          <div class="dash-card-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span>今日任务</span>
          </div>
          <div class="dash-card-value" x-text="todayCompletedCount() + '/' + todayTasks().length"></div>
          <div class="dash-progress-bar">
            <div class="dash-progress-fill" :style="'width: ' + (todayTasks().length ? (todayCompletedCount() / todayTasks().length * 100) : 0) + '%'"></div>
          </div>
        </div>
        <!-- 番茄钟 -->
        <div class="dash-card">
          <div class="dash-card-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--pomodoro-color)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>番茄钟</span>
          </div>
          <div class="dash-card-value" x-text="pomodoroRunning ? '进行中' : '空闲'"></div>
          <div class="dash-progress-bar" x-show="pomodoroRunning">
            <div class="dash-progress-fill" style="background: var(--pomodoro-color);" :style="'width: ' + (pomodoroProgress * 100) + '%'"></div>
          </div>
          <div class="text-xs text-weak mt-xs" x-text="todayPomodoroMinutes() + ' min 今日'"></div>
        </div>
        <!-- 打卡状态 -->
        <div class="dash-card">
          <div class="dash-card-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--task-color)" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <span>今日打卡</span>
          </div>
          <div class="dash-card-value" :class="todayCheckedIn() ? '' : 'text-secondary'" x-text="todayCheckedIn() ? '已完成 · ' + todayCheckinGrade() + '档' : '未打卡'"></div>
          <div class="text-xs text-weak mt-xs" x-text="'本月 ' + monthlyCheckinDays() + ' 天'"></div>
        </div>
        <!-- 最新记忆 -->
        <div class="dash-card" @click="page = 'memory'" style="cursor: pointer;">
          <div class="dash-card-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--goal-color)" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
            <span>物品记忆</span>
          </div>
          <div class="dash-card-value" x-text="memoryItems.length + ' 条'"></div>
          <div class="text-xs text-weak mt-xs" x-show="memoryItems.length > 0" x-text="'最近: ' + (memoryItems[0]?.name || '')"></div>
        </div>
        <!-- 习惯 -->
        <div class="dash-card" @click="page = 'habits'" style="cursor: pointer;">
          <div class="dash-card-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--contact-color)" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <span>习惯追踪</span>
          </div>
          <div class="dash-card-value" x-text="habitTodayDoneCount() + '/' + habits.length"></div>
          <div class="dash-progress-bar" x-show="habits.length > 0">
            <div class="dash-progress-fill" style="background: var(--contact-color);" :style="'width: ' + (habits.length ? (habitTodayDoneCount() / habits.length * 100) : 0) + '%'"></div>
          </div>
        </div>
      </div>

      <!-- 精力状态 -->
      <div class="flex justify-between items-center" style="margin-bottom: 12px;">
        <div class="flex items-center gap-sm">
          <div :style="'width: 10px; height: 10px; border-radius: 50%; background: ' + energyColor() + ';'"></div>
          <span class="text-sm" x-text="energyLabel()" style="font-weight: 500;"></span>
        </div>
        <span class="text-sm text-secondary" x-text="'今日完成 ' + todayCompletedCount() + '/' + todayTasks().length"></span>
      </div>

      <!-- 复盘提醒 -->
      <div class="review-reminder" x-show="reviewReminder" x-transition>
        <div>
          <span class="text-sm" style="font-weight: 500;">今天还没有进行复盘</span>
          <p class="text-xs text-secondary" style="margin-top: 2px;">花一分钟记录今日状态</p>
        </div>
        <button class="btn btn-primary btn-sm" @click="reviewReminder = false; page = 'checkin'">去打卡</button>
      </div>

      <!-- AI建议 -->
      <div class="hint-card" x-show="aiTip" x-transition>
        <div class="title" x-text="aiTip?.title"></div>
        <div class="desc" x-text="aiTip?.desc"></div>
        <button class="btn btn-ghost btn-sm mt-sm" @click="aiTip = null">知道了</button>
      </div>

      <!-- 打卡内联卡片（已打卡状态） -->
      <div class="checkin-inline done" x-show="todayCheckedIn() && !checkinExpanded" @click="checkinExpanded = true">
        <div class="checkin-inline-left">
          <span class="checkin-inline-icon">✓</span>
          <span class="checkin-inline-text">今日已打卡 · <strong x-text="todayCheckinGrade() + '档'"></strong></span>
          <span class="text-xs text-weak" x-text="'连续 ' + currentStreak() + ' 天'"></span>
        </div>
        <span class="text-xs text-weak" style="flex-shrink:0;">点击展开</span>
      </div>

      <!-- 打卡内联卡片（未打卡状态 / 编辑模式） -->
      <div class="checkin-inline todo" x-show="!todayCheckedIn() || checkinExpanded">
        <div class="checkin-inline-header">
          <span class="text-sm" style="font-weight: 600;" x-text="checkinExpanded ? '编辑今日打卡' : '今日打卡'"></span>
          <span class="text-xs text-weak" x-text="todayStr.split('·')[0]?.trim() || ''"></span>
        </div>
        <div class="checkin-grade-row">
          <button class="checkin-grade-btn" :class="{ 'active-a': tempCheckinGrade === 'A' }" @click="tempCheckinGrade = 'A'">
            <span class="grade-letter">A</span>
            <span class="grade-desc">完美日</span>
          </button>
          <button class="checkin-grade-btn" :class="{ 'active-b': tempCheckinGrade === 'B' }" @click="tempCheckinGrade = 'B'">
            <span class="grade-letter">B</span>
            <span class="grade-desc">基础日</span>
          </button>
          <button class="checkin-grade-btn" :class="{ 'active-c': tempCheckinGrade === 'C' }" @click="tempCheckinGrade = 'C'">
            <span class="grade-letter">C</span>
            <span class="grade-desc">兜底日</span>
          </button>
        </div>
        <div class="checkin-note-row" x-show="tempCheckinGrade">
          <input class="input" type="text" x-model="tempCheckinNote" placeholder="写一句今日感受（可选）..." style="font-size:13px;">
        </div>
        <div class="checkin-actions">
          <button class="btn btn-primary btn-sm" @click="submitCheckin()" style="flex:1;" x-text="todayCheckedIn() ? '更新打卡' : '完成打卡'"></button>
          <button class="btn btn-ghost btn-sm" x-show="checkinExpanded" @click="checkinExpanded = false" style="flex-shrink:0;">收起</button>
        </div>
      </div>

      <!-- 空状态 -->
      <div class="card" x-show="timelineBlocks().length === 0">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-weak)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <p>今天还没有安排任务</p>
          <button class="btn btn-primary mt-md" @click="page = 'nlp'">智能添加任务</button>
        </div>
      </div>

      <!-- 筛选栏 -->
      <div class="filter-bar" x-show="timelineBlocks().length > 0">
        <button class="filter-btn" :class="{ active: timelineFilterTag === null }" @click="timelineFilterTag = null">全部</button>
        <button class="filter-btn" :class="{ active: timelineFilterTag === 'work' }" @click="timelineFilterTag = timelineFilterTag === 'work' ? null : 'work'">工作</button>
        <button class="filter-btn" :class="{ active: timelineFilterTag === 'life' }" @click="timelineFilterTag = timelineFilterTag === 'life' ? null : 'life'">生活</button>
        <button class="filter-btn" :class="{ active: timelineFilterTag === 'grow' }" @click="timelineFilterTag = timelineFilterTag === 'grow' ? null : 'grow'">成长</button>
        <button class="filter-btn" :class="{ active: timelineFilterTag === 'important' }" @click="timelineFilterTag = timelineFilterTag === 'important' ? null : 'important'">重要</button>
        <span style="width: 1px; background: var(--border); margin: 0 2px;"></span>
        <button class="filter-btn" :class="{ active: timelineFilterType === null }" @click="timelineFilterType = null">全部类型</button>
        <button class="filter-btn" :class="{ active: timelineFilterType === 'fixed' }" @click="timelineFilterType = timelineFilterType === 'fixed' ? null : 'fixed'">固定</button>
        <button class="filter-btn" :class="{ active: timelineFilterType === 'flexible' }" @click="timelineFilterType = timelineFilterType === 'flexible' ? null : 'flexible'">弹性</button>
      </div>

      <!-- ===== 时间轴主体 ===== -->
      <div x-show="timelineBlocks().length > 0" style="position: relative; padding-left: 52px;">
        <!-- 时间线 -->
        <div style="position: absolute; left: 16px; top: 4px; bottom: 4px; width: 1px; background: var(--border);"></div>

        <template x-for="(block, idx) in timelineBlocks()" :key="block.id">
          <div style="position: relative; margin-bottom: 4px; transition: all 0.4s ease-in-out;"
            :style="block.type === 'gap' ? 'height: ' + block.height + 'px;' : ''"
            x-show="!timelineCollapsed || idx < 10 || block.type === 'anchor'">

            <!-- 时间刻度 -->
            <div style="position: absolute; left: -36px; top: 8px; font-size: 10px; color: var(--text-weak);"
              x-show="block.type !== 'gap'" x-text="block.timeLabel"></div>

            <!-- 时间点 -->
            <div style="position: absolute; left: -21px; top: 12px; width: 8px; height: 8px; border-radius: 50%;"
              :style="block.type === 'anchor' ? 'background: var(--border);' :
                      block.type === 'flexible' ? 'background: var(--border); border: 1px solid ' + block.color + ';' :
                      block.type === 'gap' ? 'background: transparent;' :
                      'background: ' + block.color + ';'"
              x-show="block.type !== 'gap'"></div>

            <!-- 生活锚点 -->
            <div x-show="block.type === 'anchor'"
              style="padding: 8px 12px; border-radius: var(--radius-sm); background: var(--bg-secondary); opacity: 0.7; margin-left: 4px;">
              <span class="text-xs" x-text="block.title" style="color: var(--text-secondary);"></span>
              <span class="text-xs text-weak" style="margin-left: 8px;" x-text="block.timeRange"></span>
            </div>

            <!-- 固定任务 -->
            <div x-show="block.type === 'fixed'"
              class="long-press"
              style="padding: 12px 14px; border-radius: var(--radius-md); cursor: grab; margin-left: 4px; transition: all 0.25s ease;"
              :style="{
                background: block.color + '22',
                border: block.locked ? '1px solid var(--timeline-color)' : '0.5px solid ' + block.color + '44',
                opacity: block.completed ? 0.5 : 1,
              }"
              @dblclick="toggleTaskById(block.id)"
              @pointerdown="longPressStart(block)"
              @pointerup="longPressEnd()"
              @pointerleave="longPressEnd()"
              draggable="true"
              @dragstart="dragTask(block, $event)"
              @dragover.prevent
              @drop="dropTask(block, $event)">
              <div class="flex items-center gap-md">
                <div class="checkbox" :class="{ checked: block.completed }" @click="toggleTaskById(block.id)">
                  <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6l3 3 5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <div class="flex-1">
                  <p :style="block.completed ? 'text-decoration: line-through; color: var(--text-weak);' : ''" style="font-weight: 500; font-size: 13px;" x-text="block.title"></p>
                  <div class="flex items-center gap-sm mt-sm">
                    <span class="text-xs text-secondary" x-text="block.duration + 'min'"></span>
                    <span class="tag" :class="'tag-' + block.tags[0]" x-show="block.tags.length" x-text="tagLabel(block.tags[0])" style="font-size: 10px;"></span>
                    <svg x-show="block.recurring" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-weak)" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
                    <svg x-show="block.locked" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                  </div>
                </div>
                <button class="btn btn-ghost btn-sm" style="padding: 2px 6px; min-height: auto;" @click="toggleTaskType(block)"
                  :title="block.type === 'fixed' ? '转为弹性任务' : '转为固定任务'">
                  <span class="text-xs text-weak" x-text="block.type === 'fixed' ? '→弹性' : '→固定'"></span>
                </button>
                <button class="btn btn-ghost btn-sm" style="padding: 2px 6px; min-height: auto;"
                  @click="openEditTask(block)" title="编辑任务">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="btn btn-ghost btn-sm" style="padding: 2px 6px; min-height: auto; color: var(--text-weak);"
                  @click="deleteTaskConfirm(block.id)"
                  :style="deleteConfirmId === block.id ? 'color: var(--contact-color);' : ''"
                  :title="deleteConfirmId === block.id ? '再次点击确认删除' : '删除任务'">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
              </div>
            </div>

            <!-- 弹性任务 -->
            <div x-show="block.type === 'flexible'"
              class="long-press"
              style="padding: 10px 14px; border-radius: var(--radius-md); cursor: grab; margin-left: 4px; transition: all 0.25s ease;"
              :style="{
                background: block.color + '11',
                border: '1px dashed ' + block.color + '55',
                opacity: block.completed ? 0.4 : 0.75,
              }"
              @dblclick="toggleTaskById(block.id)"
              @pointerdown="longPressStart(block)"
              @pointerup="longPressEnd()"
              @pointerleave="longPressEnd()"
              draggable="true"
              @dragstart="dragTask(block, $event)"
              @dragover.prevent
              @drop="dropTask(block, $event)">
              <div class="flex items-center gap-md">
                <div class="checkbox" :class="{ checked: block.completed }" @click="toggleTaskById(block.id)">
                  <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6l3 3 5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <div class="flex-1">
                  <p :style="block.completed ? 'text-decoration: line-through; color: var(--text-weak);' : ''" style="font-weight: 500; font-size: 13px;" x-text="block.title + '（弹性）'"></p>
                  <div class="flex items-center gap-sm mt-sm">
                    <span class="text-xs text-secondary" x-text="block.duration + 'min · 可延后'"></span>
                    <span class="tag" :class="'tag-' + block.tags[0]" x-show="block.tags.length" x-text="tagLabel(block.tags[0])" style="font-size: 10px;"></span>
                  </div>
                </div>
                <button class="btn btn-ghost btn-sm" style="padding: 2px 6px; min-height: auto;" @click="toggleTaskType(block)"
                  title="转为固定任务">
                  <span class="text-xs text-weak">→固定</span>
                </button>
                <button class="btn btn-ghost btn-sm" style="padding: 2px 6px; min-height: auto;"
                  @click="openEditTask(block)" title="编辑任务">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="btn btn-ghost btn-sm" style="padding: 2px 6px; min-height: auto; color: var(--text-weak);"
                  @click="deleteTaskConfirm(block.id)"
                  :style="deleteConfirmId === block.id ? 'color: var(--contact-color);' : ''"
                  :title="deleteConfirmId === block.id ? '再次点击确认删除' : '删除任务'">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
              </div>
            </div>

            <!-- 缓冲间隙 -->
            <div x-show="block.type === 'gap'"
              style="margin-left: 12px; border-left: 2px solid var(--border-light); padding-left: 8px; display: flex; align-items: center;"
              :style="'height: ' + block.height + 'px;'">
              <span class="text-xs text-weak" x-text="block.label || '弹性缓冲'"></span>
            </div>
          </div>
        </template>
      </div>

      <!-- 底部添加按钮 -->
      <button class="btn btn-secondary w-full mt-lg" @click="page = 'nlp'"
        x-show="timelineBlocks().length > 0">
        + 智能添加任务
      </button>

      <!-- FAB快速添加 -->
      <button class="fab" style="bottom: 88px; right: 20px;" @click="toggleQuickPanel()" x-show="page === 'home' && !showQuickPanel" title="快速添加任务">+</button>
      <button class="fab" style="bottom: 88px; right: 20px; background: var(--text-secondary);" @click="toggleQuickPanel()" x-show="page === 'home' && showQuickPanel" title="关闭">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <!-- SOS按钮 -->
      <button class="fab fab-sm fab-sos" style="bottom: 88px; left: 20px;" @click="page = 'resilience'" x-show="page === 'home'" title="紧急重排">SOS</button>

      <!-- 时间轴折叠/展开按钮 -->
      <template x-if="timelineBlocks().length > 10">
        <button class="btn btn-ghost btn-sm w-full mt-sm" @click="timelineCollapsed = !timelineCollapsed" style="text-align:center;">
          <span x-text="timelineCollapsed ? '展开全部 (' + timelineBlocks().length + ' 项)' : '收起'"></span>
        </button>
      </template>

      <!-- 快速添加面板 -->
      <div class="quick-add-panel" x-show="page === 'home' && showQuickPanel" x-transition>
        <div class="flex items-center gap-sm mb-sm">
          <span class="text-sm" style="font-weight: 500;">快速添加</span>
          <span class="text-xs text-weak">一句话即可</span>
        </div>
        <div class="flex gap-sm">
          <input id="qp-input" class="input" style="flex: 1;" x-model="quickPanelInput" @input="quickPanelDebounce()"
            @keydown.enter="quickPanelConfirm()" placeholder="明天下午开会 #工作 重要 2小时">
          <button class="btn btn-primary btn-sm" @click="quickPanelConfirm()" :disabled="!quickPanelResult">添加</button>
        </div>
        <div x-show="quickPanelResult" class="flex gap-sm mt-sm" style="flex-wrap: wrap;">
          <span class="tag tag-work" x-show="quickPanelResult?.tags?.includes('work')">工作</span>
          <span class="tag tag-life" x-show="quickPanelResult?.tags?.includes('life')">生活</span>
          <span class="tag tag-grow" x-show="quickPanelResult?.tags?.includes('grow')">成长</span>
          <span class="tag tag-important" x-show="quickPanelResult?.priority === 'high'">重要</span>
          <span class="text-xs text-secondary" x-show="quickPanelResult?.time" x-text="quickPanelResult?.time"></span>
          <span class="text-xs text-secondary" x-show="quickPanelResult?.duration" x-text="quickPanelResult?.duration + 'min'"></span>
        </div>
      </div>
    </div>
  </div>
  </template>

  <!-- ========== 页面2：NLP智能输入 ========== -->
  <template x-if="page === 'nlp'">
  <div class="page active" id="page-nlp">
    <div class="page-header">
      <div>
        <div class="flex items-center gap-sm" style="margin-bottom: 4px;">
          <button class="btn btn-ghost btn-sm" @click="goToLauncher()" style="padding: 2px 6px;">←</button>
          <h1>智能输入</h1>
        </div>
        <p class="subtitle">一句话录入，自动解析</p>
      </div>
      <button class="btn btn-ghost btn-sm" @click="page = 'home'">返回</button>
    </div>

    <div class="page-content">
      <!-- 输入区 -->
      <div class="card" style="border-color: var(--accent); border-width: 1.5px;">
        <input class="input" x-model="nlpInput" @input="nlpDebounce()"
          placeholder="例如：明天下午三点开会讨论Q3计划 #工作 重要"
          style="border: none; background: transparent; font-size: 15px; padding: 12px 0;"
          autofocus>
        <div class="flex gap-sm mt-sm" style="flex-wrap: wrap;">
          <span class="tag tag-work" x-show="nlpResult.tags.includes('work')">工作</span>
          <span class="tag tag-life" x-show="nlpResult.tags.includes('life')">生活</span>
          <span class="tag tag-grow" x-show="nlpResult.tags.includes('grow')">成长</span>
          <span class="tag tag-important" x-show="nlpResult.priority === 'high'">重要</span>
        </div>
        <div class="flex items-center gap-sm mt-xs" style="min-height: 20px;">
          <span x-show="nlpAiLoading" class="text-xs text-accent" style="animation: pulse 1.5s infinite;">AI 解析中...</span>
          <span x-show="nlpAiError" class="text-xs" style="color: var(--hint-color);" x-text="nlpAiError"></span>
          <span x-show="aiEnabled && !nlpAiLoading && !nlpAiError && nlpInput.length >= 3" class="text-xs text-weak">AI + 本地双引擎</span>
        </div>
      </div>

      <!-- 实时解析预览 -->
      <div class="card" x-show="nlpResult.title" x-transition>
        <div class="card-title" style="margin-bottom: 12px;">解析结果</div>

        <div class="flex flex-col gap-sm">
          <div class="flex items-center gap-md" style="padding: 6px 0;">
            <span class="text-sm text-secondary" style="width: 48px; flex-shrink: 0;">任务</span>
            <span style="font-weight: 500;" x-text="nlpResult.title || '—'"></span>
          </div>
          <div class="flex items-center gap-md" style="padding: 6px 0;">
            <span class="text-sm text-secondary" style="width: 48px; flex-shrink: 0;">时间</span>
            <span x-text="nlpResult.timeLabel || '今天'" :class="nlpResult.time ? '' : 'text-weak'"></span>
            <span class="text-xs text-weak" x-show="nlpResult.time" x-text="'(' + nlpResult.time + ')'"></span>
          </div>
          <div class="flex items-center gap-md" style="padding: 6px 0;">
            <span class="text-sm text-secondary" style="width: 48px; flex-shrink: 0;">时长</span>
            <span x-text="nlpResult.duration + '分钟'"></span>
            <span class="text-xs text-weak" x-show="nlpResult.durationSource" x-text="nlpResult.durationSource"></span>
          </div>
          <div class="flex items-center gap-md" style="padding: 6px 0;">
            <span class="text-sm text-secondary" style="width: 48px; flex-shrink: 0;">优先级</span>
            <span x-text="nlpResult.priorityLabel" :class="nlpResult.priority === 'high' ? 'text-accent' : ''"></span>
          </div>
          <div class="flex items-center gap-md" style="padding: 6px 0;" x-show="nlpResult.suggestedGoal">
            <span class="text-sm text-secondary" style="width: 48px; flex-shrink: 0;">关联</span>
            <span class="tag" style="background: var(--goal-color); opacity: 0.35;" x-text="nlpResult.suggestedGoalTitle"></span>
          </div>
        </div>

        <!-- 纠错提示 -->
        <div class="hint-card mt-md" x-show="nlpResult.warning" x-transition>
          <div class="title">注意</div>
          <div class="desc" x-text="nlpResult.warning"></div>
        </div>
      </div>

      <!-- 快捷模板 -->
      <div class="card" x-show="nlpTemplates.length > 0">
        <div class="card-title" style="margin-bottom: 8px;">常用模板</div>
        <div class="flex gap-sm" style="flex-wrap: wrap;">
          <template x-for="tpl in nlpTemplates" :key="tpl">
            <button class="btn btn-sm btn-secondary" @click="applyTemplate(tpl)" x-text="tpl"></button>
          </template>
        </div>
        <button class="btn btn-ghost btn-sm mt-sm" x-show="nlpInput && !nlpTemplates.includes(nlpInput)" @click="saveAsTemplate()">
          保存为模板
        </button>
      </div>

      <!-- 关联目标建议 -->
      <div class="card" x-show="nlpSuggestions.length > 0 && nlpResult.title">
        <div class="card-title" style="margin-bottom: 8px;">关联目标建议</div>
        <template x-for="g in nlpSuggestions" :key="g.id">
          <button class="btn btn-ghost btn-sm" style="display: block; width: 100%; text-align: left; margin-bottom: 4px;"
            @click="nlpResult.suggestedGoal = g.id; nlpResult.suggestedGoalTitle = g.title">
            <span x-text="g.title"></span>
            <span class="text-xs text-weak" x-text="' · ' + g.kr[0]" x-show="g.kr && g.kr.length"></span>
          </button>
        </template>
      </div>

      <!-- 确认按钮 -->
      <button class="btn btn-primary w-full mt-lg" @click="confirmNLP()" :disabled="!nlpResult.title">
        确认添加
      </button>

      <!-- 微调选项 -->
      <div class="card mt-md" x-show="nlpResult.title">
        <div class="card-title" style="margin-bottom: 8px;">微调设置</div>
        <div class="flex gap-sm" style="flex-wrap: wrap;">
          <button class="btn btn-sm" :class="nlpResult.type === '固定' ? 'btn-primary' : 'btn-secondary'" @click="nlpResult.type = '固定'">固定任务</button>
          <button class="btn btn-sm" :class="nlpResult.type === '弹性' ? 'btn-primary' : 'btn-secondary'" @click="nlpResult.type = '弹性'">弹性任务</button>
        </div>
        <div class="flex items-center gap-md mt-sm">
          <span class="text-sm text-secondary">循环任务</span>
          <label class="toggle">
            <input type="checkbox" x-model="nlpResult.recurring">
            <span class="slider"></span>
          </label>
        </div>
        <div class="flex items-center gap-md mt-sm">
          <span class="text-sm text-secondary">锁定（不可自动调整）</span>
          <label class="toggle">
            <input type="checkbox" x-model="nlpResult.locked">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- 肌肉记忆提示 -->
      <div class="hint-card mt-md" x-show="nlpMemoryHints.length > 0" x-transition>
        <div class="title">基于你的习惯</div>
        <template x-for="h in nlpMemoryHints" :key="h">
          <div class="desc" x-text="h" style="margin-bottom: 2px;"></div>
        </template>
      </div>
    </div>
  </div>
  </template>

  <!-- ========== 页面3：目标管理 ========== -->
  <template x-if="page === 'goal'">
  <div class="page active" id="page-goal">
    <div class="page-header">
      <div>
        <div class="flex items-center gap-sm" style="margin-bottom: 4px;">
          <button class="btn btn-ghost btn-sm" @click="goToLauncher()" style="padding: 2px 6px;">←</button>
          <h1>目标管理</h1>
        </div>
        <p class="subtitle">年 · 季 · 月 · 周 · 日</p>
      </div>
      <button class="btn btn-primary btn-sm" @click="openGoalModal()">+ 新建目标</button>
    </div>

    <div class="page-content">
      <!-- 五级拆解树 -->
      <template x-for="goal in goalsByType('年')" :key="goal.id">
        <div class="card">
          <div class="card-header">
            <span class="tag" style="background: var(--goal-color); opacity: 0.4;" x-text="goal.type + '度目标'"></span>
            <button class="btn btn-ghost btn-sm text-sm" @click="editGoal(goal)">编辑</button>
          </div>
          <p class="card-title" x-text="goal.title"></p>
          <p class="text-sm text-secondary mt-sm" x-text="'关键结果: ' + goal.kr.join(' | ')"></p>

          <!-- 子目标 -->
          <div class="mt-md flex flex-col gap-sm">
            <template x-for="sub in getSubGoals(goal.id)" :key="sub.id">
              <div class="flex items-center gap-sm" style="padding: 8px 12px; background: var(--bg-secondary); border-radius: var(--radius-sm);">
                <span class="tag" :style="'background: ' + typeColor(sub.type) + '; opacity: 0.3;'" x-text="sub.type"></span>
                <span class="flex-1 text-sm" x-text="sub.title"></span>
                <span class="text-xs text-weak" x-text="sub.kr[0]"></span>
              </div>
            </template>
          </div>

          <!-- Anti-Goals -->
          <div class="mt-md" x-show="goal.antiGoals && goal.antiGoals.length">
            <p class="text-xs text-secondary" style="margin-bottom: 4px;">反目标护栏</p>
            <template x-for="ag in goal.antiGoals" :key="ag">
              <span class="tag" style="background: var(--contact-color); opacity: 0.2; margin-right: 4px; margin-bottom: 4px;" x-text="ag"></span>
            </template>
          </div>

          <!-- If-Then -->
          <div class="mt-sm" x-show="goal.ifThen && goal.ifThen.length">
            <p class="text-xs text-secondary" style="margin-bottom: 4px;">障碍预演</p>
            <template x-for="it in goal.ifThen" :key="it.if">
              <p class="text-xs text-weak" x-text="'如果 ' + it.if + '，则 ' + it.then"></p>
            </template>
          </div>

          <!-- 进度条 -->
          <div class="mt-md" x-show="goal.kr.length > 0">
            <div class="flex justify-between items-center" style="margin-bottom: 6px;">
              <span class="text-xs text-secondary">本周进度</span>
              <span class="text-xs text-accent" x-text="goalProgress(goal.id) + '%'"></span>
            </div>
            <div style="height: 4px; background: var(--bg-secondary); border-radius: 2px; overflow: hidden;">
              <div :style="'height: 100%; width: ' + goalProgress(goal.id) + '%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease-in-out;'"></div>
            </div>
          </div>

          <!-- 本周ABC统计 -->
          <div class="mt-sm flex gap-sm" style="flex-wrap: wrap;">
            <span class="tag" style="background: var(--accent-light);" x-text="'A档 ' + weeklyABC(goal.id).A + '天'"></span>
            <span class="tag" style="background: var(--task-color); opacity: 0.4;" x-text="'B档 ' + weeklyABC(goal.id).B + '天'"></span>
            <span class="tag" style="background: var(--timeline-color); opacity: 0.4;" x-text="'C档 ' + weeklyABC(goal.id).C + '天'"></span>
          </div>
        </div>
      </template>

      <div class="empty-state" x-show="goals.length === 0">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-weak)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v8m-4-4h8"/></svg>
        <p>还没有设定目标</p>
        <p class="text-xs text-secondary mt-sm">设定一个年度目标，系统帮你逐层拆解</p>
      </div>
    </div>
  </div>
  </template>

  <!-- ========== 页面4：打卡与热力图 ========== -->
  <template x-if="page === 'checkin'">
  <div class="page active" id="page-checkin">
    <div class="page-header">
      <div>
        <div class="flex items-center gap-sm" style="margin-bottom: 4px;">
          <button class="btn btn-ghost btn-sm" @click="goToLauncher()" style="padding: 2px 6px;">←</button>
          <h1>每日打卡</h1>
        </div>
        <p class="subtitle" x-text="'周' + currentWeekLabel()"></p>
      </div>
    </div>

    <div class="page-content">
      <!-- 本周ABC档位总结 -->
      <div class="card" style="border: none;">
        <div class="flex justify-between items-center" style="margin-bottom: 12px;">
          <span class="card-title">本周档位分布</span>
          <span class="text-sm text-secondary" x-text="weekStats().total + '天已完成打卡'"></span>
        </div>
        <div class="flex gap-sm" style="margin-bottom: 8px;">
          <div :style="'flex: ' + (weekStats().pctA || 0.1) + '; height: 8px; background: var(--accent); border-radius: 4px; transition: all 0.5s ease-in-out;'" x-show="weekStats().pctA > 0"></div>
          <div :style="'flex: ' + (weekStats().pctB || 0.1) + '; height: 8px; background: var(--task-color); border-radius: 4px; transition: all 0.5s ease-in-out;'" x-show="weekStats().pctB > 0"></div>
          <div :style="'flex: ' + (weekStats().pctC || 0.1) + '; height: 8px; background: var(--timeline-color); border-radius: 4px; transition: all 0.5s ease-in-out;'" x-show="weekStats().pctC > 0"></div>
        </div>
        <div class="flex gap-md text-xs text-secondary">
          <span>▮ A档（完美日） <span class="text-accent" x-text="weekStats().A + '天'"></span></span>
          <span>▮ B档（基础日） <span x-text="weekStats().B + '天'" style="color: var(--text-secondary);"></span></span>
          <span>▮ C档（兜底日） <span x-text="weekStats().C + '天'" style="color: var(--text-secondary);"></span></span>
        </div>
      </div>

      <!-- 情绪记录 -->
      <div class="card" style="margin-bottom: 12px;">
        <div class="flex justify-between items-center mb-sm">
          <span class="text-sm" style="font-weight: 500;">今日心情</span>
          <span class="text-xs text-secondary" x-text="['低落','不安','平淡','愉快','兴奋'][tempEmotion - 1]"></span>
        </div>
        <input type="range" class="emotion-slider" min="1" max="5" step="1" x-model.number="tempEmotion">
      </div>

      <!-- 今日打卡卡片 -->
      <div class="card" style="border-color: var(--accent); border-width: 1.5px;">
        <div class="flex justify-between items-center">
          <div>
            <p class="card-title">今日打卡</p>
            <p class="text-sm text-secondary" x-text="todayCheckinDate()"></p>
          </div>
          <div x-show="!todayCheckedIn()" style="text-align: right;">
            <span class="text-sm text-weak">等待打卡</span>
          </div>
          <div x-show="todayCheckedIn()" style="text-align: right;">
            <span class="tag" :style="'background: ' + todayCheckinGradeColor() + '; opacity: 0.35; font-size: 14px; padding: 4px 16px;'" x-text="todayCheckinGrade() + '档'"></span>
          </div>
        </div>

        <!-- 打卡选项 -->
        <div class="mt-md" x-show="!todayCheckedIn() || todayCheckinEdit">
          <p class="text-sm text-secondary" style="margin-bottom: 8px;">今天完成了哪些？</p>
          <div class="flex gap-sm" style="margin-bottom: 12px;">
            <button class="btn btn-sm" :class="tempCheckinGrade === 'A' ? 'btn-primary' : 'btn-secondary'"

              A档 · 完美日

            <button class="btn btn-sm" :class="tempCheckinGrade === 'B' ? 'btn-primary' : 'btn-secondary'"

              B档 · 基础日

            <button class="btn btn-sm" :class="tempCheckinGrade === 'C' ? 'btn-primary' : 'btn-secondary'"

          <div class="flex gap-sm items-center mt-sm" x-show="todayTasks().length > 0">

          <input class="input mt-sm" x-model="tempCheckinNote" placeholder="备注（可选）：今天状态不错 / 下午有点累..."
            style="font-size: 13px;">

          <button class="btn btn-primary w-full mt-md" @click="submitCheckin()" x-text="todayCheckedIn() ? '更新打卡' : '完成打卡'"></button>

          <button class="btn btn-ghost btn-sm w-full mt-sm" x-show="todayCheckedIn()" @click="todayCheckinEdit = !todayCheckinEdit">
            <span x-text="todayCheckinEdit ? '取消编辑' : '修改今日打卡'"></span>
          </button>
        </div>

        <!-- 已打卡状态 -->
        <div x-show="todayCheckedIn() && !todayCheckinEdit">
          <div class="mt-md flex flex-col gap-sm">
            <p class="text-sm text-secondary" x-show="todayCheckinNote()" x-text="todayCheckinNote()"></p>
          </div>
          <div class="mt-sm">
            <span class="text-xs text-weak" x-text="'连续打卡 ' + currentStreak() + ' 天'"></span>
          </div>
        </div>
      </div>

      <!-- 月历热力图 -->
      <div class="card">
        <div class="card-header">
          <span class="card-title" x-text="currentMonthLabel() + ' 打卡记录'"></span>
          <div class="flex gap-sm">
            <button class="btn btn-ghost btn-sm text-xs" @click="heatmapOffset--">&lt;</button>
            <button class="btn btn-ghost btn-sm text-xs" @click="heatmapOffset = 0">本月</button>
            <button class="btn btn-ghost btn-sm text-xs" @click="heatmapOffset++">&gt;</button>
          </div>
        </div>

        <!-- 星期头 -->
        <div class="flex" style="margin-bottom: 4px;">
          <template x-for="d in ['一','二','三','四','五','六','日']" :key="d">
            <span class="text-xs text-weak" style="width: calc(100% / 7); text-align: center;" x-text="d"></span>
          </template>
        </div>

        <!-- 热力图格子 -->
        <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;">
          <template x-for="(day, idx) in heatmapDays()" :key="idx">
            <div :style="{
              aspectRatio: '1',
              borderRadius: '6px',
              background: day.grade === 'A' ? 'var(--accent)' :
                          day.grade === 'B' ? 'var(--task-color)' :
                          day.grade === 'C' ? 'var(--timeline-color)' :
                          day.inMonth ? 'var(--bg-secondary)' : 'transparent',
              opacity: day.grade ? 0.6 : (day.inMonth ? 0.3 : 0),
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              cursor: day.inMonth ? 'pointer' : 'default',
              fontSize: '11px', color: day.grade ? 'white' : 'var(--text-weak)',
              fontWeight: day.isToday ? '500' : '400',
              border: day.isToday ? '1.5px solid var(--accent)' : 'none',
            }" @click="day.inMonth && openDayDetail(day.date)" :title="day.label">
              <span x-text="day.dayNum" x-show="!day.grade || day.grade === 'C'"></span>
              <span x-text="day.grade" x-show="day.grade && day.grade !== 'C'"></span>
            </div>
          </template>
        </div>

        <!-- 图例 -->
        <div class="flex gap-md mt-sm text-xs text-weak items-center">
          <span>▮ A档</span>
          <span>▮ B档</span>
          <span>▮ C档</span>
          <span class="flex-1"></span>
          <span>今日边框</span>
        </div>
      </div>

      <!-- Streak 展示（零焦虑版） -->
      <div class="hint-card" x-show="currentStreak() > 0">
        <div class="title">连续记录</div>
        <div class="desc" x-text="'你已经连续 ' + currentStreak() + ' 天记录了打卡，保持自己的节奏就好。'"></div>
      </div>
      <div class="hint-card" x-show="currentStreak() === 0">
        <div class="title">今天还没打卡</div>
        <div class="desc">没关系，打卡是为了自己，不是任务。</div>
      </div>

      <!-- 每日高光 -->
      <div class="card" style="margin-top: 12px;">
        <span class="text-sm" style="font-weight: 500;">今日高光时刻</span>
        <textarea class="input mt-sm" rows="2" placeholder="记录今天最有成就感的事..."
          x-model="tempCheckinHighlight" style="resize: none;"></textarea>
        <button class="btn btn-ghost btn-sm mt-sm" @click="saveHighlight()">保存高光</button>
      </div>

      <!-- AI 每日复盘 -->
      <div class="card" style="margin-top: 16px; border: 1px solid var(--accent); background: linear-gradient(135deg, rgba(91,140,155,0.05), rgba(91,140,155,0.02));">
        <div class="flex justify-between items-center mb-sm">
          <div class="flex items-center gap-sm">
            <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--accent);"></div>
            <span class="text-sm" style="font-weight: 600;">AI 晚间复盘</span>
            <span class="text-xs text-weak">由 DeepSeek 生成</span>
          </div>
          <button class="btn btn-ghost btn-sm" @click="generateAIReview()" :disabled="aiReviewLoading">
            <span x-show="!aiReviewLoading">生成复盘</span>
            <span x-show="aiReviewLoading" style="animation: spin 1s linear infinite;">⟳</span>
          </button>
        </div>
        <div x-show="aiReviewLoading && !aiReviewText" class="text-sm text-secondary" style="text-align: center; padding: 20px 0;">
          AI 正在为你总结今天...
        </div>
        <div x-show="aiReviewText" class="text-sm" style="line-height: 1.8; white-space: pre-line;" x-text="aiReviewText"></div>
        <div x-show="!aiReviewText && !aiReviewLoading" class="text-sm text-weak" style="text-align: center; padding: 12px 0;">
          点击「生成复盘」获取今日 AI 总结
        </div>
      </div>
    </div>

    <!-- ===== 打卡详情弹窗（页面内） ===== -->
    <div class="day-detail-overlay" x-show="showDayDetail" x-transition.opacity @click.self="closeDayDetail()">
      <div class="day-detail-card">
        <div class="day-detail-header">
          <span class="day-detail-date" x-text="dayDetailData?.date"></span>
          <button class="btn btn-ghost btn-sm" @click="closeDayDetail()" style="padding: 4px 8px;">✕</button>
        </div>
        <div class="day-detail-body" x-show="dayDetailData">
          <div class="day-detail-grade" :class="'grade-' + (dayDetailData?.grade?.toLowerCase() || '')">
            <span class="day-detail-grade-letter" x-text="dayDetailData?.grade + '档'"></span>
            <span class="day-detail-grade-label" x-text="dayDetailData?.grade === 'A' ? '完美日' : dayDetailData?.grade === 'B' ? '基础日' : '兜底日'"></span>
          </div>
          <div class="day-detail-stats">
            <div class="day-detail-stat">
              <span class="day-detail-stat-num" x-text="dayDetailData?.completedTasks + '/' + dayDetailData?.totalTasks"></span>
              <span class="day-detail-stat-label">任务完成</span>
            </div>
            <div class="day-detail-stat">
              <span class="day-detail-stat-num" x-text="emotionLabel()"></span>
              <span class="day-detail-stat-label">情绪状态</span>
            </div>
          </div>
          <div class="day-detail-note" x-show="dayDetailData?.note">
            <span class="text-xs text-weak">备注</span>
            <p class="text-sm" style="margin-top: 4px;" x-text="dayDetailData?.note"></p>
          </div>
        </div>
      </div>
    </div>
  </div>
  </template>

  <!-- ========== 页面：人生规划 ========== -->

  <!-- ========== 页面5：专注种树 ========== -->
  <template x-if="page === 'pomodoro'">
  <div class="page active" id="page-pomodoro">
    <div class="page-header">
      <div class="flex items-center gap-sm">
        <button class="btn btn-ghost btn-sm" @click="goToLauncher()" style="padding: 2px 6px;">←</button>
        <h1>专注种树 🌳</h1>
      </div>
    </div>
    <div class="page-content text-center">

      <!-- ===== 3D 森林主场景（Three.js 渲染） ===== -->
      <div class="forest-main-3d" x-show="!pomodoroRunning" id="forest3dContainer">
        <!-- Three.js canvas 会自动注入到这里 -->
        <canvas id="forest3dCanvas"></canvas>

        <!-- 浮层UI: 日/周/月/年 Tab -->
        <div class="forest-3d-ui-layer">
          <!-- 日期导航 -->
          <div class="forest-nav">
            <button class="forest-nav-btn" @click="forestDatePrev()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span class="forest-nav-title" x-text="forestDateTitle()"></span>
            <button class="forest-nav-btn" @click="forestDateNext()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>

          <!-- 日/周/月/年 切换 Tab -->
          <div class="forest-period-tabs">
            <button class="forest-period-tab" :class="{ active: forestPeriod === 'day' }" @click="setForestPeriod('day')">日</button>
            <button class="forest-period-tab" :class="{ active: forestPeriod === 'week' }" @click="setForestPeriod('week')">周</button>
            <button class="forest-period-tab" :class="{ active: forestPeriod === 'month' }" @click="setForestPeriod('month')">月</button>
            <button class="forest-period-tab" :class="{ active: forestPeriod === 'year' }" @click="setForestPeriod('year')">年</button>
          </div>

          <!-- 底部统计浮层 -->
          <div class="forest-stats-overlay">
            <div class="fso-item">
              <span class="fso-num" x-text="forest3DAliveCount()"></span>
              <span class="fso-label">存活</span>
            </div>
            <div class="fso-divider"></div>
            <div class="fso-item">
              <span class="fso-num dead-color" x-text="forest3DDeadCount()"></span>
              <span class="fso-label">枯萎</span>
            </div>
            <div class="fso-divider"></div>
            <div class="fso-item">
              <span class="fso-num" x-text="forest3DFocusMinutes() + 'min'"></span>
              <span class="fso-label">专注</span>
            </div>
          </div>

          <!-- 操作提示 -->
          <div class="forest-hint">拖拽旋转 · 滚轮缩放</div>
        </div>
      </div>

      <!-- ===== 倒计时环 ===== -->
      <div class="tree-timer-container" :class="{ 'timer-active': pomodoroRunning }">
        <!-- 生长中的树 -->
        <div class="growing-tree" x-show="pomodoroRunning">
          <span class="tree-growing-emoji" x-text="getGrowingEmoji()"></span>
          <div class="soil">
            <div class="soil-mound"></div>
          </div>
        </div>

        <svg width="220" height="220" viewBox="0 0 220 220" class="timer-ring-svg">
          <circle cx="110" cy="110" r="95" fill="none" stroke="var(--border)" stroke-width="6"/>
          <circle cx="110" cy="110" r="95" fill="none" stroke="url(#treeGradient)" stroke-width="6"
            stroke-linecap="round" :stroke-dasharray="2 * Math.PI * 95"
            :stroke-dashoffset="2 * Math.PI * 95 * (1 - pomodoroProgress)"
            style="transform: rotate(-90deg); transform-origin: 110px 110px; transition: stroke-dashoffset 1s linear;"/>
          <defs>
            <linearGradient id="treeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#A8D8A8"/>
              <stop offset="100%" style="stop-color:#5B8C5A"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="timer-center-text">
          <span class="timer-time" x-text="formatTime(pomodoroRemaining)"></span>
          <span class="timer-label text-sm text-secondary" x-text="pomodoroRunning ? '专注中...' : '准备种树'"></span>
        </div>
      </div>

      <!-- ===== 模式选择 ===== -->
      <div class="tree-mode-select" x-show="!pomodoroRunning">
        <button class="tree-mode-btn" :class="{ active: pomodoroMode === 'standard' }" @click="setPomodoroMode('standard')">
          <span class="mode-emoji">🌿</span>
          <span class="mode-name">小树苗</span>
          <span class="mode-time" x-text="pomodoroDurations.standard + 'min'"></span>
        </button>
        <button class="tree-mode-btn" :class="{ active: pomodoroMode === 'sprint' }" @click="setPomodoroMode('sprint')">
          <span class="mode-emoji">🌲</span>
          <span class="mode-name">松树</span>
          <span class="mode-time" x-text="pomodoroDurations.sprint + 'min'"></span>
        </button>
        <button class="tree-mode-btn" :class="{ active: pomodoroMode === 'deep' }" @click="setPomodoroMode('deep')">
          <span class="mode-emoji">🎄</span>
          <span class="mode-name">大树</span>
          <span class="mode-time" x-text="pomodoroDurations.deep + 'min'"></span>
        </button>
        <button class="tree-mode-btn" :class="{ active: pomodoroMode === 'custom' }" @click="setPomodoroMode('custom')">
          <span class="mode-emoji">✨</span>
          <span class="mode-name">自定义</span>
          <span class="mode-time" x-text="customMinutes + 'min'"></span>
        </button>
      </div>

      <!-- 自定义时间滑块 -->
      <div class="card tree-custom-card" x-show="!pomodoroRunning && pomodoroMode === 'custom'">
        <div class="tree-slider-label">
          <span>专注时长</span>

            <span class="ms-check" x-show="totalAliveTrees() >= 5">✓</span>
          </div>
          <div class="tree-milestone" :class="{ reached: totalAliveTrees() >= 10 }">
            <span class="ms-icon">🌲</span><span>10棵 · 小树林</span>
            <span class="ms-check" x-show="totalAliveTrees() >= 10">✓</span>
          </div>
          <div class="tree-milestone" :class="{ reached: totalAliveTrees() >= 20 }">
            <span class="ms-icon">🏕️</span><span>20棵 · 森林守护者</span>
            <span class="ms-check" x-show="totalAliveTrees() >= 20">✓</span>
          </div>
          <div class="tree-milestone" :class="{ reached: totalAliveTrees() >= 50 }">
            <span class="ms-icon">🏞️</span><span>50棵 · 生态大师</span>

          </div>
          <div class="tree-milestone" :class="{ reached: totalAliveTrees() >= 100 }">

            <span class="ms-check" x-show="totalAliveTrees() >= 100">✓</span>

            <span class="text-xs text-weak">50%</span>
            <span class="text-xs text-weak">0%</span>
          </div>
          <!-- 网格线 -->
          <div style="position: absolute; left: 28px; right: 0; top: 0; bottom: 0;">
            <div style="position: absolute; top: 0; left: 0; right: 0; height: 1px; background: var(--border);"></div>
            <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border);"></div>
            <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: var(--border);"></div>

                  transition: 'height 0.5s ease-in-out',

                <span class="text-xs text-weak mt-sm" x-text="d.label"></span>
              </div>

          </div>

                minHeight: seg.hours > 0 ? '12px' : '4px',
                transition: 'height 0.5s ease-in-out',

            <p class="text-xs text-secondary">番茄完成</p>

            <div class="text-xs text-weak">只给排序</div>
          </button>
        </div>
      </div>
    </div>
  </div>

        <p class="text-sm text-secondary" style="margin-bottom: 12px;">选择一个场景，系统自动调整今日安排</p>
        <div class="flex gap-sm" style="flex-wrap: wrap; margin-bottom: 12px;">
          <template x-for="tpl in emergencyTemplates" :key="tpl.id">

            </button>
          </template>
        </div>
      </div>

      <!-- 多方案重排 -->
      <div class="card" x-show="emergencySelected" x-transition>
        <div class="card-title" style="margin-bottom: 12px;">为你准备了调整方案</div>

            @click="applyEmergencyPlan('A')">

              <span style="font-weight: 500;">方案A：顺延至明日</span>
              <span class="tag" style="background: var(--accent); color: white; opacity: 0.9;">推荐</span>
            </div>
            <p class="text-xs text-secondary mt-sm">将未完成的任务平移至明天，保持今日节奏不受影响。</p>
          </button>

          <button class="btn" style="display: block; width: 100%; text-align: left; padding: 14px; border-radius: var(--radius-md); background: var(--card-bg); border: 0.5px solid var(--border);"
            @click="applyEmergencyPlan('B')">
            <span style="font-weight: 500;">方案B：压缩今日任务</span>
            <p class="text-xs text-secondary mt-sm">删减低优先级任务，保核心事项。</p>
          </button>

          <button class="btn" style="display: block; width: 100%; text-align: left; padding: 14px; border-radius: var(--radius-md); background: var(--card-bg); border: 0.5px solid var(--border);"
            @click="applyEmergencyPlan('C')">
            <span style="font-weight: 500;">方案C：启动兜底日（C档）</span>
            <p class="text-xs text-secondary mt-sm">只保留最基本的事项，其余暂停。</p>
          </button>
        </div>
      </div>

      <!-- V1.2 弹性方案预览 -->
      <div class="modal-overlay" x-show="showResiliencePreview" @click.self="cancelResiliencePreview()" x-transition style="display: none;">
        <div>

                <span class="text-xs text-secondary" x-text="c.detail"></span>

          </div>
          <div class="flex gap-sm" style="margin-top: 16px;">
            <button class="btn btn-secondary" style="flex: 1;" @click="cancelResiliencePreview()">取消</button>
            <button class="btn btn-primary" style="flex: 1;" @click="confirmResiliencePlan()">确认执行</button>
          </div>
        </div>
      </div>

              <div class="ws-label">习惯完成</div>
            </div>
            <div class="wr-stat">
              <div class="ws-val" x-text="weeklyReportData().checkinDays"></div>
              <div class="ws-label">打卡天数</div>
            </div>
          </div>
        </div>

        <!-- 打卡分布 -->
        <div class="wr-section">
          <div class="wr-section-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--task-color)" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            打卡分布
          </div>
          <div class="wr-stat-row">
            <div class="wr-stat">
              <div class="ws-val" style="color:var(--task-color);" x-text="weeklyReportData().gradeA"></div>
              <div class="ws-label">A档 · 完美日</div>
            </div>
            <div class="wr-stat">
              <div class="ws-val" style="color:var(--accent);" x-text="weeklyReportData().gradeB"></div>
              <div class="ws-label">B档 · 基础日</div>
            </div>
            <div class="wr-stat">
              <div class="ws-val" style="color:var(--contact-color);" x-text="weeklyReportData().gradeC"></div>
              <div class="ws-label">C档 · 兜底日</div>
            </div>
          </div>
        </div>

        <!-- 情绪趋势 -->
        <div class="wr-section">
          <div class="wr-section-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--goal-color)" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            情绪趋势
          </div>
          <div class="ic-stats">
            <div class="ic-stat" x-text="'😊 ' + weeklyReportData().moodHappy + '天'"></div>
            <div class="ic-stat" x-text="'😐 ' + weeklyReportData().moodNeutral + '天'"></div>
            <div class="ic-stat" x-text="'😔 ' + weeklyReportData().moodSad + '天'"></div>
          </div>
          <div class="text-xs text-secondary mt-sm" x-text="weeklyMoodSummary()"></div>
        </div>

        <!-- 高光时刻 -->
        <div class="wr-section" x-show="weeklyReportData().highlights.length > 0">
          <div class="wr-section-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--pomodoro-color)" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            高光时刻
          </div>
          <template x-for="h in weeklyReportData().highlights" :key="h">
            <div class="wr-highlight">
              <span>⭐</span>
              <span x-text="h"></span>
            </div>
          </template>
        </div>

        <!-- 导出按钮 -->
        <div class="wr-export-bar">
          <button class="btn btn-primary w-full" @click="exportWeeklyReport()">导出为文本</button>
        </div>
      </div>
    </div>
  </div>
  </template>

  <!-- ========== 页面：习惯追踪 ========== -->
  <template x-if="page === 'habits'">
  <div class="page active habit-page" id="page-habits">
    <div class="page-header">
      <div class="flex items-center gap-sm">
        <button class="btn btn-ghost btn-sm" @click="goToLauncher()" style="padding: 2px 6px;">←</button>
        <h1>习惯追踪</h1>
      </div>
      <button class="btn btn-primary btn-sm" @click="habitShowForm = !habitShowForm; habitEditingId = null;" x-text="habitShowForm ? '取消' : '+ 新习惯'"></button>
    </div>
    <div class="page-content">
      <!-- 连胜横幅 -->
      <template x-if="habitStreakDays() > 0">
        <div class="habit-streak-banner">
          <div class="streak-flame">🔥</div>
          <div class="streak-info">
            <div class="streak-days" x-text="habitStreakDays()"></div>
            <div class="streak-label">连续完成天数</div>
          </div>
          <div class="streak-weekly">
            <div class="weekly-pct" x-text="habitWeeklyPct() + '%'"></div>
            <div class="weekly-label">本周完成率</div>
          </div>
        </div>
      </template>

      <!-- 添加表单 -->
      <template x-if="habitShowForm || habitEditingId">
        <div class="habit-form-card" x-transition>
          <div class="form-title" x-text="habitEditingId ? '编辑习惯' : '新建习惯'"></div>
          <div class="form-group">
            <label>习惯名称</label>
            <input class="input" type="text" x-model="habitForm.name" placeholder="例如：每天阅读30分钟" @keydown.enter="saveHabit()">
          </div>
          <div class="form-group">
            <label>图标</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <template x-for="icon in habitIconOptions" :key="icon.value">
                <button style="padding:8px;border-radius:8px;border:1px solid var(--border);background:habitForm.icon===icon.value?'var(--accent-light)':'var(--card-bg)';cursor:pointer;font-size:18px;" @click="habitForm.icon = icon.value" x-text="icon.emoji"></button>
              </template>
            </div>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-primary" style="flex:1" @click="saveHabit()" x-text="habitEditingId ? '保存' : '创建'"></button>
            <button class="btn btn-ghost" @click="habitShowForm = false; habitEditingId = null;">取消</button>
          </div>
        </div>
      </template>

      <!-- 习惯列表 -->
      <template x-if="habits.length > 0">
        <div>
          <template x-for="habit in habits" :key="habit.id">
            <div class="habit-card">
              <div class="habit-card-row" @click="toggleHabitToday(habit)">
                <div class="habit-check-circle" :class="habitTodayDone(habit) ? 'done' : (habitHasMissed(habit) ? 'missed' : '')">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" x-show="habitTodayDone(habit)"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div class="habit-info">
                  <div class="habit-name">
                    <span x-text="habit.icon || '📌'"></span>
                    <span x-text="habit.name"></span>
                  </div>
                  <div class="habit-meta">
                    <template x-if="habitStreak(habit) >= 7">
                      <span class="habit-streak-badge fire">🔥 <span x-text="habitStreak(habit) + '天'"></span></span>
                    </template>
                    <template x-if="habitStreak(habit) >= 3 && habitStreak(habit) < 7">
                      <span class="habit-streak-badge ice">⭐ <span x-text="habitStreak(habit) + '天'"></span></span>
                    </template>
                    <span class="text-xs text-weak" x-text="'创建于 ' + (habit.createdAt || '').slice(0, 10)"></span>
                  </div>
                </div>
                <div class="habit-week-dots">
                  <template x-for="(day, di) in habitWeekStatus(habit)" :key="di">
                    <div class="habit-week-dot" :class="day === 'done' ? 'done' : day === 'missed' ? 'missed' : ''"></div>
                  </template>
                </div>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- 空状态 -->
      <template x-if="habits.length === 0">
        <div class="habit-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <p>还没有追踪任何习惯</p>
          <p style="font-size:12px;color:var(--text-weak);margin-top:4px;">添加每日微习惯，追踪你的坚持</p>
          <button class="btn btn-primary mt-md" @click="habitShowForm = true">添加第一个习惯</button>
        </div>
      </template>
    </div>
  </div>
  </template>

  <!-- ========== 页面：全局搜索 ========== -->
  <template x-if="page === 'search'">
  <div class="search-overlay">
    <div class="search-top">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-weak)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" x-model="searchQuery" @input="performSearch()" placeholder="搜索任务、目标、人脉、记忆..." x-ref="searchInput" autofocus>
      <button class="btn btn-ghost btn-sm" @click="searchQuery = ''; page = 'home'">取消</button>
    </div>
    <div class="search-results">
      <!-- 搜索历史 -->
      <template x-if="!searchQuery.trim() && searchHistory.length > 0">
        <div class="search-history">
          <div class="sh-title">最近搜索</div>
          <div class="sh-tags">
            <template x-for="h in searchHistory.slice(0, 8)" :key="h">
              <button class="sh-tag" @click="searchQuery = h; performSearch()" x-text="h"></button>
            </template>
          </div>
        </div>
      </template>

      <!-- 搜索结果 -->
      <template x-if="searchQuery.trim()">
        <div>
          <!-- 任务 -->
          <template x-if="searchResults.tasks.length > 0">
            <div class="search-result-group">
              <div class="group-label">任务</div>
              <template x-for="item in searchResults.tasks.slice(0, 5)" :key="item.id">
                <div class="search-result-item" @click="page = 'home'">
                  <div class="sr-icon task">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                  </div>
                  <div class="sr-content">
                    <div class="sr-title" x-html="highlightText(item.title, searchQuery)"></div>
                    <div class="sr-subtitle" x-text="item.time ? item.time + ' · ' + item.duration + 'min' : item.duration + 'min'"></div>
                  </div>
                  <div class="sr-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
                </div>
              </template>
            </div>
          </template>

          <!-- 目标 -->
          <template x-if="searchResults.goals.length > 0">
            <div class="search-result-group">
              <div class="group-label">目标</div>
              <template x-for="item in searchResults.goals.slice(0, 5)" :key="item.id">
                <div class="search-result-item" @click="page = 'goal'">
                  <div class="sr-icon goal">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/></svg>
                  </div>
                  <div class="sr-content">
                    <div class="sr-title" x-html="highlightText(item.title, searchQuery)"></div>
                    <div class="sr-subtitle" x-text="item.type + '目标' + (item.kr ? ' · ' + item.kr.length + '关键结果' : '')"></div>
                  </div>
                  <div class="sr-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
                </div>
              </template>
            </div>
          </template>

          <!-- 人脉 -->
          <template x-if="searchResults.contacts.length > 0">
            <div class="search-result-group">
              <div class="group-label">人脉</div>
              <template x-for="item in searchResults.contacts.slice(0, 5)" :key="item.id">
                <div class="search-result-item" @click="page = 'contacts'">
                  <div class="sr-icon contact">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                  </div>
                  <div class="sr-content">
                    <div class="sr-title" x-html="highlightText(item.name, searchQuery)"></div>
                    <div class="sr-subtitle" x-text="item.relation || item.company || '联系人'"></div>
                  </div>
                  <div class="sr-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
                </div>
              </template>
            </div>
          </template>

          <!-- 智能记忆 -->
          <template x-if="searchResults.memories.length > 0">
            <div class="search-result-group">
              <div class="group-label">物品记忆</div>
              <template x-for="item in searchResults.memories.slice(0, 5)" :key="item.id">
                <div class="search-result-item" @click="page = 'memory'">
                  <div class="sr-icon memory">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
                  </div>
                  <div class="sr-content">
                    <div class="sr-title" x-html="highlightText(item.name, searchQuery)"></div>
                    <div class="sr-subtitle" x-text="'位置: ' + item.location"></div>
                  </div>
                  <div class="sr-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
                </div>
              </template>
            </div>
          </template>

          <!-- 无结果 -->
          <template x-if="searchResults.total === 0 && searchQuery.trim().length >= 2">
            <div class="search-empty">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--text-weak)" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <p style="margin-top: 12px;">未找到 "<span x-text="searchQuery"></span>" 相关结果</p>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>
  </template>

  <!-- ========== 页面：个人中心 ========== -->
  <template x-if="page === 'profile'">
  <div class="page active" id="page-profile">
    <div class="page-header">
      <div class="flex items-center gap-sm">
        <button class="btn btn-ghost btn-sm" @click="goToLauncher()" style="padding: 2px 6px;">←</button>
        <h1>个人中心</h1>
      </div>
      <template x-if="profileEditing">
        <button class="btn btn-primary btn-sm" @click="saveProfile()">保存</button>

      <template x-if="!profileEditing">
        <button class="btn btn-ghost btn-sm" @click="startEditProfile()">编辑</button>
      </template>

          <span x-text="authUser ? authUser.username + ' · 已认证' : '本地模式'"></span>

        <div class="profile-stat">
          <div class="stat-value" x-text="goals.length"></div>
